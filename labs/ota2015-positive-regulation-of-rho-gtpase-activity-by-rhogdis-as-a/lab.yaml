schema_version: '2.0'
title: Ota2015 Positive Regulation Of Rho Gtpase Activity By Rhogdis As A Lab
description: This is a ordinary differential equation mathematical model describing
  the Rho GTPase cycle in which Rho GDP-dissociation inhibitors (RhoGDIs) inhibit
  the regulatory activities of guanine nucleotide e. It can be used to explore systemsbiology
  ota2015 positive regulation of rho dynamics and compare simulation behavior across
  conditions.
