schema_version: '2.0'
title: Zhang2007 - Mechanism of DNA damage response (Model2)
description: Its a mechanistic model explaining the impact of p53 on apoptosis decision.
  It can be used to explore systemsbiology zhang2007 mechanism of dna damage dynamics
  and compare simulation behavior across conditions.
