schema_version: '2.0'
title: Hayer2005_AMPAR_CaMKII_strong_coupling
description: This is a model of tight coupling between the AMPAR trafficking bistability,
  and the CaMKII autophosphorylation bistability. In this model, the CaMKII activity
  is self sustaining only when AMPAR is tu.
standard: other
tags:
- signaling
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Arnold Hayer
- Upinder S Bhalla
upstream:
  id: biomodels_ebi:MODEL9087255381
  source_db: biomodels_ebi
  source_id: MODEL9087255381
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/MODEL9087255381
  download_url: https://www.ebi.ac.uk/biomodels/model/download/MODEL9087255381?filename=MODEL9087255381_url.xml
  license: CC0
biosim:
  entrypoint: src.hayer2005_ampar_camkii_strong_coupling_model9087255381_model:Hayer2005AmparCamkiiStrongCouplingModel9087255381Model
  init_kwargs:
    model_path: data/MODEL9087255381.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
io:
