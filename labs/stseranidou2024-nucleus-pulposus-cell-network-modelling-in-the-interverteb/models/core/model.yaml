schema_version: '2.0'
title: stseranidou2024 - Nucleus Pulposus Cell Network Modelling in the Intervertebral
  Disc
description: 'ABSTRACT: Intervertebral disc degeneration (IDD) arises from an intricate
  imbalance between the anabolic and catabolic processes governing the extracellular
  matrix (ECM) within the disc. It can be used to explore systemsbiology stseranidou2024
  nucleus pulposus cell network dynamics and compare simulation behavior across conditions.'
