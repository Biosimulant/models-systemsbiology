    description: Gluc_prod. Maps to SBML symbol `Gluc_prod`.
  - name: k_icf_mmol
    maps_to: K_ICF_mmol
    label: K_ICF_mmol
    description: K_ICF_mmol. Maps to SBML symbol `K_ICF_mmol`.
  - name: ins_b
