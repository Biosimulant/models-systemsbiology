title: Ma2005 Digital Response Of P53 To Dna Damage Atm Activation Modul Lab
description: Recent observations show that the single-cell response of p53 to ionizing
  radiation (IR) is “digital” in that it is the number of oscillations rather than
  the amplitude of p53 that shows dependence on. It can be used to explore systemsbiology
  ma2005 digital response of p53 dynamics and compare simulation behavior across conditions.
