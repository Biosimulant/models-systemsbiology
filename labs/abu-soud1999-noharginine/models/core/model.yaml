io:
  inputs:
  - name: initial_noh_minus_arginine
    maps_to: NOH_minus_Arginine
    label: Initial Noh Minus Arginine
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `NOH_minus_Arginine`.
  - name: initial_im_minus_nnos
    maps_to: Im_minus_nNOS
    label: Initial Im Minus Nnos
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Im_minus_nNOS`.
  - name: initial_imidazole
    maps_to: Imidazole
    label: Initial Imidazole
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Imidazole`.
  - name: initial_nnos_minus_noh_minus_arginine
    maps_to: nNOS_minus_NOH_minus_Arginine
    label: Initial Nnos Minus Noh Minus Arginine
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `nNOS_minus_NOH_minus_Arginine`.
  - name: initial_im_minus_nnos_minus_noh_minus_arginine
    maps_to: Im_minus_nNOS_minus_NOH_minus_Arginine
    label: Initial Im Minus Nnos Minus Noh Minus Arginine
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Im_minus_nNOS_minus_NOH_minus_Arginine`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: noh_minus_arginine
    maps_to: NOH_minus_Arginine
    label: NOH Minus Arginine
    description: NOH Minus Arginine. Maps to SBML symbol `NOH_minus_Arginine`.
  - name: im_minus_nnos
    maps_to: Im_minus_nNOS
    label: Im Minus NNOS
    description: Im Minus NNOS. Maps to SBML symbol `Im_minus_nNOS`.
  - name: imidazole
    maps_to: Imidazole
    label: Imidazole
    description: Imidazole. Maps to SBML symbol `Imidazole`.
  - name: nnos_minus_noh_minus_arginine
    maps_to: nNOS_minus_NOH_minus_Arginine
    label: NNOS Minus NOH Minus Arginine
    description: NNOS Minus NOH Minus Arginine. Maps to SBML symbol `nNOS_minus_NOH_minus_Arginine`.
  - name: im_minus_nnos_minus_noh_minus_arginine
    maps_to: Im_minus_nNOS_minus_NOH_minus_Arginine
    label: Im Minus NNOS Minus NOH Minus Arginine
    description: Im Minus NNOS Minus NOH Minus Arginine. Maps to SBML symbol `Im_minus_nNOS_minus_NOH_minus_Arginine`.
