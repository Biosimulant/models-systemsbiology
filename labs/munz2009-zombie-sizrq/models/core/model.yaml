io:
  inputs:
  - name: initial_zombie
    maps_to: Z
    label: Initial Zombie
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Z`.
  - name: initial_susceptible
    maps_to: S
    label: Initial Susceptible
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `S`.
  - name: initial_removed
    maps_to: R
    label: Initial Removed
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `R`.
  - name: initial_quarantined
    maps_to: Q
    label: Initial Quarantined
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Q`.
  - name: initial_infected
    maps_to: I
    label: Initial Infected
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `I`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: zombie
    maps_to: Z
    label: Zombie
    description: Zombie. Maps to SBML symbol `Z`.
  - name: susceptible
    maps_to: S
    label: Susceptible
    description: Susceptible. Maps to SBML symbol `S`.
  - name: removed
    maps_to: R
    label: Removed
    description: Removed. Maps to SBML symbol `R`.
  - name: quarantined
    maps_to: Q
    label: Quarantined
    description: Quarantined. Maps to SBML symbol `Q`.
  - name: infected
    maps_to: I
    label: Infected
    description: Infected. Maps to SBML symbol `I`.
