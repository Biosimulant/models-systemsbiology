    maps_to: cTc
    label: cTc
    description: cTc. Maps to SBML symbol `cTc`.
  - name: c_xc
    maps_to: cXc
    label: cXc
    description: cXc. Maps to SBML symbol `cXc`.
  - name: c_pn
    maps_to: cPn
    label: cPn
    description: cPn. Maps to SBML symbol `cPn`.
  - name: c_lm
    maps_to: cLm
    label: cLm
    description: cLm. Maps to SBML symbol `cLm`.
  - name: c_tm
    maps_to: cTm
    label: cTm
    description: cTm. Maps to SBML symbol `cTm`.
  - name: c_xn
    maps_to: cXn
    label: cXn
    description: cXn. Maps to SBML symbol `cXn`.
