    packages:
    - tellurium==2.2.11.2
io:
  inputs:
  - name: initial_a_rel
    maps_to: aRel
    label: Initial A Rel
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `aRel`.
  - name: initial_model_state_a
    maps_to: a
    label: Initial Model State A
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `a`.
  - name: initial_model_state_b
    maps_to: b
    label: Initial Model State B
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `b`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: a_rel
    maps_to: aRel
    label: aRel
    description: aRel. Maps to SBML symbol `aRel`.
  - name: model_state_a
    maps_to: a
    label: a
    description: a. Maps to SBML symbol `a`.
  - name: model_state_b
    maps_to: b
    label: b
    description: b. Maps to SBML symbol `b`.
