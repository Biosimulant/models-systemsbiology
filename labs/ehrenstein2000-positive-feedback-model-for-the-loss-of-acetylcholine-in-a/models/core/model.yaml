  id: biomodels_ebi:BIOMD0000000552
  source_db: biomodels_ebi
  source_id: BIOMD0000000552
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000552
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000552?filename=BIOMD0000000552_url.xml
  license: CC0
biosim:
  entrypoint: src.ehrenstein2000_positive_feedback_model_for_the_l_biomd0000000552_model:Ehrenstein2000PositiveFeedbackModelForTheLBiomd0000000552Model
  init_kwargs:
    model_path: data/BIOMD0000000552.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
