  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: mkp3_slash_nuc_mapk_star_slash_act_transcription_slash_act_transcription_cplx
    maps_to: MKP3_slash_nuc_MAPK_star__slash_act_transcription_slash_act_transcription_cplx
