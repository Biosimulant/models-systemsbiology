  source_db: biomodels_ebi
  source_id: MODEL1101170000
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/MODEL1101170000
  download_url: https://www.ebi.ac.uk/biomodels/model/download/MODEL1101170000?filename=MODEL1101170000_url.xml
