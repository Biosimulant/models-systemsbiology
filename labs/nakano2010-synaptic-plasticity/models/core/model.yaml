biosim:
  entrypoint: src.nakano2010_synaptic_plasticity_model1101170000_model:Nakano2010SynapticPlasticityModel1101170000Model
  init_kwargs:
    model_path: data/MODEL1101170000.xml
  communication_step: 1.0
runtime:
