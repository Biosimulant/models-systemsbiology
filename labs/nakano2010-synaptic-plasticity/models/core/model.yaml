io:
  inputs:
  - name: initial_model_state_atp
    maps_to: ATP
    label: Initial Model State ATP
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `ATP`.
  - name: initial_ac_gsa_atp
    maps_to: AC_Gsa_ATP
    label: Initial Ac Gsa ATP
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `AC_Gsa_ATP`.
  - name: initial_ac_gsa_ca_atp
    maps_to: ACGsa_Ca_ATP
    label: Initial Ac Gsa Ca ATP
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `ACGsa_Ca_ATP`.
  - name: initial_cam_total
    maps_to: Cam_total
    label: Initial Cam Total
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Cam_total`.
  - name: initial_ca_m
    maps_to: CaM
    label: Initial Ca M
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `CaM`.
  - name: initial_ca_mkii
    maps_to: CaMKII
    label: Initial Ca Mkii
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `CaMKII`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: atp
    maps_to: ATP
    label: ATP
    description: ATP. Maps to SBML symbol `ATP`.
  - name: ac_gsa_atp
    maps_to: AC_Gsa_ATP
    label: AC Gsa ATP
    description: AC Gsa ATP. Maps to SBML symbol `AC_Gsa_ATP`.
  - name: ac_gsa_ca_atp
    maps_to: ACGsa_Ca_ATP
    label: ACGsa Ca ATP
    description: ACGsa Ca ATP. Maps to SBML symbol `ACGsa_Ca_ATP`.
  - name: cam_total
    maps_to: Cam_total
    label: Cam Total
    description: Cam Total. Maps to SBML symbol `Cam_total`.
  - name: ca_m
    maps_to: CaM
    label: CaM
    description: CaM. Maps to SBML symbol `CaM`.
  - name: ca_mkii
    maps_to: CaMKII
    label: CaMKII
    description: CaMKII. Maps to SBML symbol `CaMKII`.
