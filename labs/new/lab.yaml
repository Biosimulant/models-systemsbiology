schema_version: '2.0'
title: New Lab
description: Toy model used to validate DynafluxR, as detailed in the publication.
  It can be used to explore systemsbiology new model2502210001 dynamics and compare
  simulation behavior across conditions.
models:
- alias: systemsbiology_sbml_new_model_model2502210001_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: systemsbiology_sbml_new_model_model2502210001_model.state
  to:
  - visualisation.systemsbiology_sbml_new_model_model2502210001_model_state
- from: systemsbiology_sbml_new_model_model2502210001_model.summary
  to:
  - visualisation.systemsbiology_sbml_new_model_model2502210001_model_summary
- from: systemsbiology_sbml_new_model_model2502210001_model.species_labels
  to:
  - visualisation.systemsbiology_sbml_new_model_model2502210001_model_species_labels
runtime:
  duration: 1.0
  communication_step: 0.1
  initial_inputs: {}
tags:
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
io:
