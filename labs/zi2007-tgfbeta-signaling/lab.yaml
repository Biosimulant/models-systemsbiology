schema_version: '2.0'
title: Zi2007 Tgfbeta Signaling Lab
description: The model reproduces the time profiles of Total Smad2 in the nucleus
  as well as the cytoplasm as depicted in 2D and also the other time profiles as depicted
  in Fig 2. It can be used to explore systemsbiology zi2007 tgfbeta signaling BioModels0000000163
  dynamics and compare simulation behavior across conditions.
models:
- alias: systemsbiology_sbml_zi2007_tgfbeta_signaling_biomd0000000163_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: systemsbiology_sbml_zi2007_tgfbeta_signaling_biomd0000000163_model.state
  to:
  - visualisation.systemsbiology_sbml_zi2007_tgfbeta_signaling_biomd0000000163_model_state
