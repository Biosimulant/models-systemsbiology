schema_version: '2.0'
title: Mouse Iron Distribution Adequate Iron Diet Lab
description: Mouse Iron Distribution Dynamics Dynamic model of iron distribution in
  mice. This model includes only normal iron with the parameters that fit the data
  from Lopes et al.
models:
- alias: systemsbiology_sbml_mouse_iron_distribution_adequate_iron_diet_no_tr_biomd0000000736_model
  path: models/core
- alias: visualisation
  path: models/visualisation
