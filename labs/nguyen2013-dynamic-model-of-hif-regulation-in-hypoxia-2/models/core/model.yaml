  - name: initial_hi_falpha_n
    maps_to: HIFalpha_n
    label: Initial Hi Falpha N
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `HIFalpha_n`.
  - name: initial_hi_falpha_a_oh_n
    maps_to: HIFalpha_aOH_n
    label: Initial Hi Falpha A Oh N
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `HIFalpha_aOH_n`.
  - name: initial_hi_falpha_a_oh
    maps_to: HIFalpha_aOH
    label: Initial Hi Falpha A Oh
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `HIFalpha_aOH`.
  - name: initial_model_state_fih
    maps_to: FIH
    label: Initial Model State Fih
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `FIH`.
  - name: initial_model_state_o2
    maps_to: O2
    label: Initial Model State O2
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `O2`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: fih_n
    maps_to: FIH_n
    label: FIH_n
    description: FIH_n. Maps to SBML symbol `FIH_n`.
  - name: hi_falpha_n
    maps_to: HIFalpha_n
    label: HIFalpha_n
    description: HIFalpha_n. Maps to SBML symbol `HIFalpha_n`.
  - name: hi_falpha_a_oh_n
    maps_to: HIFalpha_aOH_n
    label: HIFalpha-aOH_n
    description: HIFalpha-aOH_n. Maps to SBML symbol `HIFalpha_aOH_n`.
  - name: hi_falpha_a_oh
    maps_to: HIFalpha_aOH
    label: HIFalpha-aOH
    description: HIFalpha-aOH. Maps to SBML symbol `HIFalpha_aOH`.
  - name: fih
    maps_to: FIH
    label: FIH
    description: FIH. Maps to SBML symbol `FIH`.
  - name: model_state_o2
    maps_to: O2
    label: O2
    description: O2. Maps to SBML symbol `O2`.
