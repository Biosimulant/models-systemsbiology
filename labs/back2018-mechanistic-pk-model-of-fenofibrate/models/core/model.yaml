schema_version: '2.0'
title: Back2018 - Mechanistic PK model of Fenofibrate
description: A mechanistic GI absorption model for quantitatively evaluating the effects
  of food on fenofibrate absorption was successfully developed, and acceptable parameters
  were obtained. It can be used to explore systemsbiology back2018 mechanistic pk
  of fenofibrate dynamics and compare simulation behavior across conditions.
