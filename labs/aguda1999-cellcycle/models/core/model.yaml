schema_version: '2.0'
title: Aguda1999_CellCycle
description: The model reproduces the time profiles of p27, E2F and aE/cdk2 as depicted
  in Figure 5 c of the paper. It can be used to explore systemsbiology aguda1999 cellcycle
  BioModels0000000169 dynamics and compare simulation behavior across conditions.
