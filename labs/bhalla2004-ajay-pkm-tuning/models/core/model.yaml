schema_version: '2.0'
title: Ajay_Bhalla_2004_PKM_Tuning
description: This model is taken from the &lt;a href = http://www.ncbi.nlm.nih.gov/entrez/query.fcgi?db=pubmed&amp;cmd=Retrieve&amp;dopt=AbstractPlus&amp;list_uids=15548210&amp;query_hl=1&amp;itool=pubmed_docsum'&.
  It can be used to explore systemsbiology ajay bhalla 2004 pkm tuning dynamics and
  compare simulation behavior across conditions.
standard: other
tags:
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Sriram M Ajay
- Upinder S Bhalla
upstream:
  id: biomodels_ebi:MODEL9089491423
  source_db: biomodels_ebi
  source_id: MODEL9089491423
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/MODEL9089491423
  download_url: https://www.ebi.ac.uk/biomodels/model/download/MODEL9089491423?filename=MODEL9089491423_url.xml
  license: CC0
biosim:
  entrypoint: src.ajay_bhalla_2004_pkm_tuning_model9089491423_model:AjayBhalla2004PkmTuningModel9089491423Model
  init_kwargs:
    model_path: data/MODEL9089491423.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
io:
  inputs:
  - name: initial_egfr_slash_internal_l_dot_egfr
    maps_to: EGFR_slash_Internal_L_dot_EGFR
    label: Initial EGFR Slash Internal L Dot EGFR
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `EGFR_slash_Internal_L_dot_EGFR`.
  - name: initial_ac_slash_atp
    maps_to: AC_slash_ATP
    label: Initial Ac Slash ATP
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `AC_slash_ATP`.
  - name: initial_mapk_slash_mapk
    maps_to: MAPK_slash_MAPK
    label: Initial MAPK Slash MAPK
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `MAPK_slash_MAPK`.
  - name: initial_ras_slash_gdp_minus_ras
    maps_to: Ras_slash_GDP_minus_Ras
    label: Initial RAS Slash Gdp Minus RAS
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Ras_slash_GDP_minus_Ras`.
  - name: initial_mapk_slash_mapkk
    maps_to: MAPK_slash_MAPKK
    label: Initial MAPK Slash Mapkk
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `MAPK_slash_MAPKK`.
  - name: initial_mapk_slash_craf_minus_1
    maps_to: MAPK_slash_craf_minus_1
    label: Initial MAPK Slash Craf Minus 1
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `MAPK_slash_craf_minus_1`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: egfr_slash_internal_l_dot_egfr
    maps_to: EGFR_slash_Internal_L_dot_EGFR
    label: EGFR Slash Internal L Dot EGFR
    description: EGFR Slash Internal L Dot EGFR. Maps to SBML symbol `EGFR_slash_Internal_L_dot_EGFR`.
  - name: ac_slash_atp
    maps_to: AC_slash_ATP
    label: AC Slash ATP
    description: AC Slash ATP. Maps to SBML symbol `AC_slash_ATP`.
  - name: mapk_slash_mapk
    maps_to: MAPK_slash_MAPK
    label: MAPK Slash MAPK
    description: MAPK Slash MAPK. Maps to SBML symbol `MAPK_slash_MAPK`.
  - name: ras_slash_gdp_minus_ras
    maps_to: Ras_slash_GDP_minus_Ras
    label: RAS Slash GDP Minus RAS
    description: RAS Slash GDP Minus RAS. Maps to SBML symbol `Ras_slash_GDP_minus_Ras`.
  - name: mapk_slash_mapkk
    maps_to: MAPK_slash_MAPKK
    label: MAPK Slash MAPKK
    description: MAPK Slash MAPKK. Maps to SBML symbol `MAPK_slash_MAPKK`.
  - name: mapk_slash_craf_minus_1
    maps_to: MAPK_slash_craf_minus_1
    label: MAPK Slash Craf Minus 1
    description: MAPK Slash Craf Minus 1. Maps to SBML symbol `MAPK_slash_craf_minus_1`.
