schema_version: '2.0'
title: Pearce2021 Fibrin Polymerization Lab
description: Here is an ode model for in vitro fibrin matrix polymerization reproducing
  interactions among fibrinogen, fibrin and other proteins involved in the homeostatic
  phase of wound healing. It can be used to explore systemsbiology pearce2021 fibrin
  polymerization BioModels0000001054 dynamics and compare simulation behavior across
  conditions.
