schema_version: '2.0'
title: Eungdamrong2007 Ras Activation Lab
description: The model reproduces the time profiles of Golgi Ras-GTP and plasma membrane
  Ras-GTP, subjected to a palmitoylation rate of 0.00015849 second inverse. This is
  depicted in Fig 5a and 5b for various palm.
models:
- alias: systemsbiology_sbml_eungdamrong2007_ras_activation_biomd0000000161_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: systemsbiology_sbml_eungdamrong2007_ras_activation_biomd0000000161_model.state
  to:
  - visualisation.systemsbiology_sbml_eungdamrong2007_ras_activation_biomd0000000161_model_state
- from: systemsbiology_sbml_eungdamrong2007_ras_activation_biomd0000000161_model.summary
