  - visualisation.systemsbiology_sbml_eungdamrong2007_ras_activation_biomd0000000161_model_summary
- from: systemsbiology_sbml_eungdamrong2007_ras_activation_biomd0000000161_model.species_labels
  to:
  - visualisation.systemsbiology_sbml_eungdamrong2007_ras_activation_biomd0000000161_model_species_labels
runtime:
  duration: 1.0
  communication_step: 0.1
  initial_inputs: {}
tags:
- cellcycle
- signaling
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
