schema_version: '2.0'
title: NguyenLK2011 - Ubiquitination dynamics in Ring1B/Bmi1 system
description: NguyenLK2011 - Ubiquitination dynamics inRing1B-Bmi1 system This theoretical
  model investigates thedynamics of Ring1B/Bmi1 ubiquitination to identify bistableswitch-like
  and oscillatory behaviour in t. It can be used to explore systemsbiology nguyenlk2011
  ubiquitination dynamics in ring1b dynamics and compare simulation behavior across
  conditions.
