schema_version: '2.0'
title: A quantitative model of the initiation of DNA replication in Saccharomyces
  cerevisiae predicts the effects of system perturbations
description: Requires input from Chen2004(BIOMD0000000056) model but did not work
  correctly even after integrating both models. It can be used to explore systemsbiology
  a quantitative of the initiation dynamics and compare simulation behavior across
  conditions.
