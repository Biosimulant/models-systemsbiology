    label: Gs
    description: Gs. Maps to SBML symbol `Gs_cell`.
  - name: dmnb_camp
    maps_to: DMNB_cAMP_cell
    label: DMNB_cAMP
    description: DMNB_cAMP. Maps to SBML symbol `DMNB_cAMP_cell`.
  - name: model_state_rc
    maps_to: RC_cell
    label: RC
    description: RC. Maps to SBML symbol `RC_cell`.
  - name: model_state_pp
    maps_to: PP_cell
    label: PP
    description: PP. Maps to SBML symbol `PP_cell`.
