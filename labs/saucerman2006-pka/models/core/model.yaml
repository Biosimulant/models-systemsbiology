      stimulus, dose, ligand, protocol, substrate, or environmental control. Maps
      to SBML symbol `toff_local_light_cAMP_photolysis`.
  - name: ton_global_light_camp_photolysis
    maps_to: ton_global_light_cAMP_photolysis
