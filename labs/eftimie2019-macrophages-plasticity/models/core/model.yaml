  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: virus_xv
    maps_to: Virus_Xv
    label: Virus(Xv)
    description: Virus(Xv). Maps to SBML symbol `Virus_Xv`.
  - name: m2_macrophage_xm2
