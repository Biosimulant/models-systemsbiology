schema_version: '2.0'
title: Eftimie2019-Macrophages Plasticity
description: This paper describes the complex interactions between two extreme types
  of macrophages (M1 and M2 cells), effector T cells and an oncolytic Vesicular Stomatitis
  Virus (VSV), on the growth/elimination. It can be used to explore systemsbiology
  eftimie2019 macrophages plasticity BioModels0000000806 dynamics and compare simulation
  behavior across conditions.
standard: other
tags:
- immunology
- oncology
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- R Eftimie
- G Eftimie
