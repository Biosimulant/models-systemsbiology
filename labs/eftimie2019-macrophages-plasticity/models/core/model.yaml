    label: Initial M2 Macrophage XM2
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `M2_Macrophage_Xm2`.
  - name: initial_m1_macrophage_xm1
    maps_to: M1_Macrophage_Xm1
    label: Initial M1 Macrophage XM1
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `M1_Macrophage_Xm1`.
  - name: initial_infected_tumour_cells_xi
    maps_to: Infected_Tumour_Cells_Xi
    label: Initial Infected Tumour Cells Xi
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Infected_Tumour_Cells_Xi`.
  - name: initial_un_infected_tumour_cells_xu
    maps_to: UnInfected_Tumour_Cells_Xu
    label: Initial Un Infected Tumour Cells Xu
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `UnInfected_Tumour_Cells_Xu`.
  - name: initial_effector_cytotoxic_cd8_t_cells_xe
    maps_to: Effector_Cytotoxic_CD8_TCells__Xe
