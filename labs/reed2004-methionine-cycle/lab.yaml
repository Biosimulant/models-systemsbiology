schema_version: '2.0'
title: Reed2004 Methionine Cycle Lab
description: 'Reed2004 - Methionine Cycle This model is described in the article:
  A mathematical model of the methionine cycle. Reed MC, Nijhout HF, Sparks R, Ulrich
  CM.'
models:
- alias: systemsbiology_sbml_reed2004_methionine_cycle_biomd0000000698_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: systemsbiology_sbml_reed2004_methionine_cycle_biomd0000000698_model.state
  to:
  - visualisation.systemsbiology_sbml_reed2004_methionine_cycle_biomd0000000698_model_state
- from: systemsbiology_sbml_reed2004_methionine_cycle_biomd0000000698_model.summary
  to:
  - visualisation.systemsbiology_sbml_reed2004_methionine_cycle_biomd0000000698_model_summary
- from: systemsbiology_sbml_reed2004_methionine_cycle_biomd0000000698_model.species_labels
  to:
  - visualisation.systemsbiology_sbml_reed2004_methionine_cycle_biomd0000000698_model_species_labels
runtime:
  duration: 1.0
  communication_step: 0.1
  initial_inputs: {}
tags:
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
