  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: cystathionine
    maps_to: Cystathionine
    label: Cystathionine
    description: Cystathionine. Maps to SBML symbol `Cystathionine`.
  - name: metin
    maps_to: Metin
    label: Metin
    description: Metin. Maps to SBML symbol `Metin`.
  - name: ado_met
    maps_to: AdoMet
    label: AdoMet
    description: AdoMet. Maps to SBML symbol `AdoMet`.
  - name: methionine
    maps_to: Methionine
    label: Methionine
    description: Methionine. Maps to SBML symbol `Methionine`.
  - name: ado_hcy
    maps_to: AdoHcy
    label: AdoHcy
    description: AdoHcy. Maps to SBML symbol `AdoHcy`.
  - name: model_state_5m_thf
