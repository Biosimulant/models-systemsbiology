schema_version: '2.0'
title: Lopez2013 - extrinsic apoptosis M1a embedded
description: Systems Biology Lopez2013Extrinsic Apoptosis M1a Embedded Model1303010000Model
  models core biological dynamics as a OTHER simulation curated from biomodels_ebi
  (biomodels_ebi:MODEL1303010000), focused on system. When you run it, you can track
  state over time and compare response patterns across parameter settings.
