title: Bornheimer2004 Gtpasecycle Lab
description: This model is according to the paper Computational modeling reveals how
  interplay between components of a GTPase-cycle module regulates signal transduction
  by Bornheimer et al 2004.The figure 3 is rep. It can be used to explore systemsbiology
  bornheimer2004 gtpasecycle BioModels0000000086 dynamics and compare simulation behavior
  across conditions.
