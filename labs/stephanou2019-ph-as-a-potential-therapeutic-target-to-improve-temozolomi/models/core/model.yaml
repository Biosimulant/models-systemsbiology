title: Stephanou2019 - pH as a potential therapeutic target to improve temozolomide
  antitumor efficacy
description: Abstract:Despite intensive treatments including temozolomide (TMZ) administration,
  glioblastoma patient prognosis remains dismal and innovative therapeutic strategies
  are urgently needed. It can be used to explore systemsbiology stephanou2019 ph as
  a potential dynamics and compare simulation behavior across conditions.
