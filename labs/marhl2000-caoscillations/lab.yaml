schema_version: '2.0'
title: Marhl2000 Caoscillations Lab
description: In order to reproduce the model, the volume of all compartment is set
  to 1, and the stoichiometry of CaER and CaM has been set to 0.25, corresponding
  to betaER/rhoER and betaM/rhoM described in the pa. It can be used to explore systemsbiology
  marhl2000 caoscillations BioModels0000000039 dynamics and compare simulation behavior
  across conditions.
models:
- alias: systemsbiology_sbml_marhl2000_caoscillations_biomd0000000039_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: systemsbiology_sbml_marhl2000_caoscillations_biomd0000000039_model.state
  to:
  - visualisation.systemsbiology_sbml_marhl2000_caoscillations_biomd0000000039_model_state
- from: systemsbiology_sbml_marhl2000_caoscillations_biomd0000000039_model.summary
