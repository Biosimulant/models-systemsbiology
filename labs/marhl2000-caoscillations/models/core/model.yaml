  - name: initial_ca_pr
    maps_to: CaPr
    label: Initial Ca Pr
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `CaPr`.
  - name: initial_model_state_pr
    maps_to: Pr
    label: Initial Model State Pr
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Pr`.
  - name: initial_ca_er
    maps_to: CaER
    label: Initial Ca Er
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `CaER`.
  - name: initial_ca_cyt
    maps_to: Ca_cyt
    label: Initial Ca Cyt
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Ca_cyt`.
  - name: initial_ca_m
    maps_to: CaM
    label: Initial Ca M
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `CaM`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: ca_pr
    maps_to: CaPr
    label: CaPr
    description: CaPr. Maps to SBML symbol `CaPr`.
  - name: model_state_pr
    maps_to: Pr
    label: Pr
    description: Pr. Maps to SBML symbol `Pr`.
  - name: ca_er
    maps_to: CaER
    label: CaER
    description: CaER. Maps to SBML symbol `CaER`.
  - name: ca_cyt
    maps_to: Ca_cyt
    label: Ca Cyt
    description: Ca Cyt. Maps to SBML symbol `Ca_cyt`.
  - name: ca_m
    maps_to: CaM
    label: CaM
    description: CaM. Maps to SBML symbol `CaM`.
