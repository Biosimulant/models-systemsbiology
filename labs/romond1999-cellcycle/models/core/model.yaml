  - name: initial_cdk1
    maps_to: M1
    label: Initial Cdk1
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `M1`.
  - name: initial_ubiquitin_ligase
    maps_to: X1
    label: Initial Ubiquitin Ligase
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `X1`.
  - name: initial_cyclin_e
    maps_to: C2
    label: Initial Cyclin E
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `C2`.
  - name: initial_cdk2
    maps_to: M2
    label: Initial Cdk2
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `M2`.
  - name: initial_ubiquitin_ligase_2
    maps_to: X2
    label: Initial Ubiquitin Ligase 2
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `X2`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: cyclin_b
    maps_to: C1
    label: cyclinB
    description: cyclinB. Maps to SBML symbol `C1`.
  - name: cdk1
    maps_to: M1
    label: cdk1
    description: cdk1. Maps to SBML symbol `M1`.
  - name: ubiquitin_ligase
    maps_to: X1
    label: ubiquitin ligase
    description: ubiquitin ligase. Maps to SBML symbol `X1`.
  - name: cyclin_e
    maps_to: C2
    label: cyclinE
    description: cyclinE. Maps to SBML symbol `C2`.
  - name: cdk2
    maps_to: M2
    label: cdk2
    description: cdk2. Maps to SBML symbol `M2`.
  - name: ubiquitin_ligase_2
    maps_to: X2
    label: Ubiquitin ligase 2
    description: Ubiquitin ligase 2. Maps to SBML symbol `X2`.
