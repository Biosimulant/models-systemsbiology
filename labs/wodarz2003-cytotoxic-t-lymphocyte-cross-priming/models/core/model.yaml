    - tellurium==2.2.11.2
io:
  inputs:
  - name: initial_a_star
    maps_to: A_star
    label: Initial A Star
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `A_star`.
  - name: initial_model_state_t
    maps_to: T
    label: Initial Model State T
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `T`.
  - name: initial_model_state_c
    maps_to: C
    label: Initial Model State C
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `C`.
  - name: initial_model_state_a
    maps_to: A
    label: Initial Model State A
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `A`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: a_star
    maps_to: A_star
    label: A Star
    description: A Star. Maps to SBML symbol `A_star`.
  - name: model_state_t
    maps_to: T
    label: T
    description: T. Maps to SBML symbol `T`.
  - name: model_state_c
    maps_to: C
    label: C
    description: C. Maps to SBML symbol `C`.
  - name: model_state_a
    maps_to: A
    label: A
    description: A. Maps to SBML symbol `A`.
