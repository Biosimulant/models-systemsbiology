schema_version: '2.0'
title: Wodarz2003 - Cytotoxic T lymphocyte cross-priming
description: 'This a model from the article: A dynamical perspective of CTL cross-priming
  and regulation: implications forcancer immunology. It can be used to explore systemsbiology
  wodarz2003 cytotoxic t lymphocyte cross dynamics and compare simulation behavior
  across conditions.'
standard: other
tags:
- immunology
- oncology
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Dominik Wodarz
- Vincent A A Jansen
upstream:
  id: biomodels_ebi:BIOMD0000000685
  source_db: biomodels_ebi
  source_id: BIOMD0000000685
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000685
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000685?filename=BIOMD0000000685_url.xml
  license: CC0
biosim:
  entrypoint: src.wodarz2003_cytotoxic_t_lymphocyte_cross_priming_biomd0000000685_model:Wodarz2003CytotoxicTLymphocyteCrossPrimingBiomd0000000685Model
  init_kwargs:
    model_path: data/BIOMD0000000685.xml
  communication_step: 1.0
runtime:
