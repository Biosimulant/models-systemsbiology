schema_version: '2.0'
title: Proctor2017- Role of microRNAs in osteoarthritis (miR140-SMAD3 double negative
  feedback)
description: 'Proctor2017- Role of microRNAs inosteoarthritis (miR140-SMAD3 double
  negative feedback) This model is described in the article: Computer simulation models
  as a tool to investigate the role of microRNA. It can be used to explore systemsbiology
