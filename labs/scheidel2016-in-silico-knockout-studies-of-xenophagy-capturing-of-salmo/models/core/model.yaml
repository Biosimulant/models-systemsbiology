schema_version: '2.0'
title: Scheidel2016 - In Silico Knockout Studies of Xenophagy Capturing of Salmonella
description: Xenophagy, also known as antibacterial autophagy, is a process of capturing
  and eliminating cytosolic pathogens, like Salmonella. Salmonella is the best-studied
  model organism for xenophagy.
