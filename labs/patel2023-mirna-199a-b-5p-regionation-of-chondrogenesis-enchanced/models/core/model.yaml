schema_version: '2.0'
title: Patel2023 - miRNA-199a/b-5p regionation of chondrogenesis - enchanced
description: From a previous microarray study we developed a small chondrogenesis
  model. We performed qPCR and measured how knockdown of miR-199a-5p or miR-199b-5p
  could modulate chondrogenesis.
