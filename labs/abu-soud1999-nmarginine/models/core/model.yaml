    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `NM_minus_Arginine`.
  - name: initial_im_minus_nnos
    maps_to: Im_minus_nNOS
    label: Initial Im Minus Nnos
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Im_minus_nNOS`.
  - name: initial_imidazole
    maps_to: Imidazole
    label: Initial Imidazole
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Imidazole`.
  - name: initial_nnos_minus_nm_minus_arginine
    maps_to: nNOS_minus_NM_minus_Arginine
    label: Initial Nnos Minus Nm Minus Arginine
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `nNOS_minus_NM_minus_Arginine`.
  - name: initial_im_minus_nnos_minus_nm_minus_arginine
    maps_to: Im_minus_nNOS_minus_NM_minus_Arginine
