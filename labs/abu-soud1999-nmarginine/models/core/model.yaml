    label: NM Minus Arginine
    description: NM Minus Arginine. Maps to SBML symbol `NM_minus_Arginine`.
  - name: im_minus_nnos
    maps_to: Im_minus_nNOS
    label: Im Minus NNOS
    description: Im Minus NNOS. Maps to SBML symbol `Im_minus_nNOS`.
  - name: imidazole
    maps_to: Imidazole
    label: Imidazole
    description: Imidazole. Maps to SBML symbol `Imidazole`.
  - name: nnos_minus_nm_minus_arginine
    maps_to: nNOS_minus_NM_minus_Arginine
    label: NNOS Minus NM Minus Arginine
    description: NNOS Minus NM Minus Arginine. Maps to SBML symbol `nNOS_minus_NM_minus_Arginine`.
  - name: im_minus_nnos_minus_nm_minus_arginine
    maps_to: Im_minus_nNOS_minus_NM_minus_Arginine
