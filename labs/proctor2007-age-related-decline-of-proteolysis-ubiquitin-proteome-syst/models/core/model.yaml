schema_version: '2.0'
title: Proctor2007 - Age related decline of proteolysis, ubiquitin-proteome system
description: Proctor2007 - Age related decline of proteolysis, ubiquitin-proteome
  system This is a stochastic model of the ubiquitin-proteasome system for a generic
  pool of native proteins (NatP), which have a hal. It can be used to explore systemsbiology
  proctor2007 age related decline of dynamics and compare simulation behavior across
  conditions.
