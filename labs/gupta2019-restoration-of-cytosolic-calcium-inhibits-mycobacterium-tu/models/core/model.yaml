schema_version: '2.0'
title: Gupta2019 - Restoration of cytosolic calcium inhibits Mycobacterium tuberculosis
  intracellular growth
description: This is a four dimensionsal ordinary differential equation mathematical
  model that explores the contribution of PI3P during Mycobacterium tuberculosis (Mtb)
  phagocytosis. It can be used to explore systemsbiology gupta2019 restoration of
  cytosolic calcium dynamics and compare simulation behavior across conditions.
standard: other
