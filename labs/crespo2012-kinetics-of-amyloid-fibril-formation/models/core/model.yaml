schema_version: '2.0'
title: Crespo2012 - Kinetics of Amyloid Fibril Formation
description: 'Crespo2012 - Kinetics of Amyloid FibrilFormation This model is described
  in the article: A generic crystallization-like model that describes the kinetics
  of amyloid fibril formation. It can be used to explore systemsbiology crespo2012
  kinetics of amyloid fibril dynamics and compare simulation behavior across conditions.'
standard: other
tags:
- generegulation
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Rosa Crespo
- Fernando A Rocha
- Ana M Damas
- Pedro M Martins
upstream:
  id: biomodels_ebi:BIOMD0000000531
  source_db: biomodels_ebi
  source_id: BIOMD0000000531
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000531
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000531?filename=BIOMD0000000531_url.xml
  license: CC0
biosim:
  entrypoint: src.crespo2012_kinetics_of_amyloid_fibril_formation_biomd0000000531_model:Crespo2012KineticsOfAmyloidFibrilFormationBiomd0000000531Model
  init_kwargs:
    model_path: data/BIOMD0000000531.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
