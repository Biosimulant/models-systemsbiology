    label: ATP
    description: ATP. Maps to SBML symbol `ATP`.
  - name: model_state_ac
    maps_to: AC
    label: AC
    description: AC. Maps to SBML symbol `AC`.
  - name: model_state_ri
    maps_to: Ri
    label: Ri
    description: Ri. Maps to SBML symbol `Ri`.
  - name: ri_g
    maps_to: RiG
    label: RiG
    description: RiG. Maps to SBML symbol `RiG`.
  - name: ra_g
    maps_to: RaG
    label: RaG
    description: RaG. Maps to SBML symbol `RaG`.
