schema_version: '2.0'
title: Zeilinger2006 Prr7 Prr9 Y Lab
description: The model reproduces the circadian charecteristics as given in Table
  1 for the PRR7-PRR9-Y model. The model makes use of the event section to introduce
  light at 30 hours.
models:
- alias: systemsbiology_sbml_zeilinger2006_prr7_prr9_y_biomd0000000095_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: systemsbiology_sbml_zeilinger2006_prr7_prr9_y_biomd0000000095_model.state
  to:
  - visualisation.systemsbiology_sbml_zeilinger2006_prr7_prr9_y_biomd0000000095_model_state
- from: systemsbiology_sbml_zeilinger2006_prr7_prr9_y_biomd0000000095_model.summary
