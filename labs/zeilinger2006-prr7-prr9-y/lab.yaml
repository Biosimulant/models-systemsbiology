- from: systemsbiology_sbml_zeilinger2006_prr7_prr9_y_biomd0000000095_model.species_labels
  to:
  - visualisation.systemsbiology_sbml_zeilinger2006_prr7_prr9_y_biomd0000000095_model_species_labels
runtime:
  duration: 1.0
  communication_step: 0.1
  initial_inputs: {}
tags:
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
