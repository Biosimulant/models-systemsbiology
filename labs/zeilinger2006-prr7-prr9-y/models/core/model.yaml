    maps_to: cXn
    label: Initial C Xn
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `cXn`.
  - name: initial_c_p7c
    maps_to: cP7c
    label: Initial C P7C
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `cP7c`.
  - name: initial_c_xc
    maps_to: cXc
    label: Initial C Xc
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `cXc`.
  - name: initial_c_xm
    maps_to: cXm
    label: Initial C Xm
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `cXm`.
  - name: initial_c_tn
    maps_to: cTn
    label: Initial C Tn
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `cTn`.
  - name: initial_c_yc
    maps_to: cYc
    label: Initial C Yc
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `cYc`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: c_xn
    maps_to: cXn
    label: cXn
    description: cXn. Maps to SBML symbol `cXn`.
  - name: c_p7c
    maps_to: cP7c
    label: cP7c
    description: cP7c. Maps to SBML symbol `cP7c`.
  - name: c_xc
    maps_to: cXc
    label: cXc
    description: cXc. Maps to SBML symbol `cXc`.
  - name: c_xm
    maps_to: cXm
    label: cXm
    description: cXm. Maps to SBML symbol `cXm`.
  - name: c_tn
    maps_to: cTn
    label: cTn
    description: cTn. Maps to SBML symbol `cTn`.
  - name: c_yc
