schema_version: '2.0'
title: Zeilinger2006_PRR7-PRR9-Y
description: The model reproduces the circadian charecteristics as given in Table
  1 for the PRR7-PRR9-Y model. The model makes use of the event section to introduce
  light at 30 hours.
standard: other
tags:
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Melanie N Zeilinger
- Eva M Farré
- Stephanie R Taylor
- Steve A Kay
- Francis J Doyle
upstream:
  id: biomodels_ebi:BIOMD0000000095
  source_db: biomodels_ebi
  source_id: BIOMD0000000095
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000095
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000095?filename=BIOMD0000000095_url.xml
  license: CC0
biosim:
  entrypoint: src.zeilinger2006_prr7_prr9_y_biomd0000000095_model:Zeilinger2006Prr7Prr9YBiomd0000000095Model
  init_kwargs:
    model_path: data/BIOMD0000000095.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
io:
