schema_version: '2.0'
title: Nikolov2020 P53 Mir34 Lab
description: Svetoslav Nikolov, Olaf Wolkenhauer, Julio Vera & Momchil Nenov. The
  role of cooperativity in a p53-miR34 dynamical mathematical model.
models:
- alias: systemsbiology_sbml_nikolov2020_p53_mir34_model_biomd0000001057_model
