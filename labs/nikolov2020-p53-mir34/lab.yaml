  - visualisation.systemsbiology_sbml_nikolov2020_p53_mir34_model_biomd0000001057_model_species_labels
runtime:
  duration: 1.0
  communication_step: 0.1
  initial_inputs: {}
tags:
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
io:
