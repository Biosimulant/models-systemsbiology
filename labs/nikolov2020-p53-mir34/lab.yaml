  - name: state
    maps_to: systemsbiology_sbml_nikolov2020_p53_mir34_model_biomd0000001057_model.state
  - name: summary
    maps_to: systemsbiology_sbml_nikolov2020_p53_mir34_model_biomd0000001057_model.summary
  - name: species_labels
    maps_to: systemsbiology_sbml_nikolov2020_p53_mir34_model_biomd0000001057_model.species_labels
  - name: mi_r34a
    maps_to: systemsbiology_sbml_nikolov2020_p53_mir34_model_biomd0000001057_model.mi_r34a
