schema_version: '2.0'
title: Nikolov2020 - p53-miR34 model
description: Svetoslav Nikolov, Olaf Wolkenhauer, Julio Vera & Momchil Nenov. The
  role of cooperativity in a p53-miR34 dynamical mathematical model.
standard: other
tags:
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Nikolov S
- Wolkenhauer O
- Vera J
- Nenov M
upstream:
  id: biomodels_ebi:BIOMD0000001057
  source_db: biomodels_ebi
  source_id: BIOMD0000001057
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000001057
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000001057?filename=Nikolov2020.xml
  license: CC0
biosim:
  entrypoint: src.nikolov2020_p53_mir34_model_biomd0000001057_model:Nikolov2020P53Mir34ModelBiomd0000001057Model
  init_kwargs:
    model_path: data/BIOMD0000001057.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
io:
  inputs:
  - name: initial_mi_r34a
    maps_to: miR34a
    label: Initial Mi R34a
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `miR34a`.
  - name: initial_t_fp53
    maps_to: TFp53
    label: Initial T Fp53
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `TFp53`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: mi_r34a
    maps_to: miR34a
    label: miR34a
    description: miR34a. Maps to SBML symbol `miR34a`.
  - name: t_fp53
    maps_to: TFp53
    label: TFp53
    description: TFp53. Maps to SBML symbol `TFp53`.
