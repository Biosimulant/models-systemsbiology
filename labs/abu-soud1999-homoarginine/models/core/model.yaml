schema_version: '2.0'
title: Abu-Soud1999_HomoArginine
description: This model is taken from the &lt;a href = 'http://www.ncbi.nlm.nih.gov/entrez/query.fcgi?db=pubmed&amp;cmd=Retrieve&amp;dopt=AbstractPlus&amp;list_uids=10493814&amp;query_hl=10&amp;itool=pubmed_docsum.
  It can be used to explore systemsbiology abu soud1999 homoarginine model9087988095
  dynamics and compare simulation behavior across conditions.
standard: other
tags:
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- H M Abu-Soud
- J Wang
- D L Rousseau
- D J Stuehr
upstream:
  id: biomodels_ebi:MODEL9087988095
  source_db: biomodels_ebi
  source_id: MODEL9087988095
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/MODEL9087988095
  download_url: https://www.ebi.ac.uk/biomodels/model/download/MODEL9087988095?filename=MODEL9087988095_url.xml
  license: CC0
biosim:
  entrypoint: src.abu_soud1999_homoarginine_model9087988095_model:AbuSoud1999HomoarginineModel9087988095Model
  init_kwargs:
    model_path: data/MODEL9087988095.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
io:
  inputs:
  - name: initial_homoarginine
    maps_to: Homoarginine
    label: Initial Homoarginine
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Homoarginine`.
  - name: initial_im_minus_nnos
    maps_to: Im_minus_nNOS
    label: Initial Im Minus Nnos
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Im_minus_nNOS`.
  - name: initial_nnos_minus_homoarginine
    maps_to: nNOS_minus_Homoarginine
    label: Initial Nnos Minus Homoarginine
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `nNOS_minus_Homoarginine`.
  - name: initial_imidazole
    maps_to: Imidazole
    label: Initial Imidazole
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Imidazole`.
  - name: initial_im_minus_nnos_minus_homoarginine
    maps_to: Im_minus_nNOS_minus_Homoarginine
    label: Initial Im Minus Nnos Minus Homoarginine
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Im_minus_nNOS_minus_Homoarginine`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: homoarginine
    maps_to: Homoarginine
    label: Homoarginine
    description: Homoarginine. Maps to SBML symbol `Homoarginine`.
  - name: im_minus_nnos
    maps_to: Im_minus_nNOS
    label: Im Minus NNOS
    description: Im Minus NNOS. Maps to SBML symbol `Im_minus_nNOS`.
  - name: nnos_minus_homoarginine
    maps_to: nNOS_minus_Homoarginine
    label: NNOS Minus Homoarginine
    description: NNOS Minus Homoarginine. Maps to SBML symbol `nNOS_minus_Homoarginine`.
  - name: imidazole
    maps_to: Imidazole
    label: Imidazole
    description: Imidazole. Maps to SBML symbol `Imidazole`.
  - name: im_minus_nnos_minus_homoarginine
    maps_to: Im_minus_nNOS_minus_Homoarginine
    label: Im Minus NNOS Minus Homoarginine
    description: Im Minus NNOS Minus Homoarginine. Maps to SBML symbol `Im_minus_nNOS_minus_Homoarginine`.
