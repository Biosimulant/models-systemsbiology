schema_version: '2.0'
title: Ratushny2012_SPF
description: 'This model is from the article: Asymmetric positive feedback loops reliably
  control biological responses Alexander V Ratushny, Ramsey A Saleem, Katherine Sitko,
  Stephen A Ramsey &amp; John D Aitchison. It can be used to explore systemsbiology
  ratushny2012 spf BioModels0000000418 dynamics and compare simulation behavior across
  conditions.'
standard: other
tags:
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Alexander V Ratushny
- Ramsey A Saleem
- Katherine Sitko
- Stephen A Ramsey
- John D Aitchison
upstream:
  id: biomodels_ebi:BIOMD0000000418
  source_db: biomodels_ebi
  source_id: BIOMD0000000418
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000418
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000418?filename=BIOMD0000000418_url.xml
  license: CC0
biosim:
  entrypoint: src.ratushny2012_spf_biomd0000000418_model:Ratushny2012SpfBiomd0000000418Model
  init_kwargs:
    model_path: data/BIOMD0000000418.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
io:
  inputs:
  - name: initial_model_state_p
    maps_to: P
    label: Initial Model State P
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `P`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: model_state_p
    maps_to: P
    label: P
    description: P. Maps to SBML symbol `P`.
