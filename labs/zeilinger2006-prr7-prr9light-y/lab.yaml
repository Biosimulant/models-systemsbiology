schema_version: '2.0'
title: Zeilinger2006 Prr7 Prr9light Y Lab
description: The model reproduces the time profile of cYm and cTm under light-dark
  cycles as depicted in Fig 4 and Fig 5 respectively. 12 hour light-dark cycles are
  accomplished using a simple algorithm in the eve.
