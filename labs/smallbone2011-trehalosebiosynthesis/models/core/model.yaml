io:
  inputs:
  - name: initial_glucose
    maps_to: glx
    label: Initial Glucose
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `glx`.
  - name: initial_glucose_6_phosphate
    maps_to: g6p
    label: Initial Glucose 6 Phosphate
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `g6p`.
  - name: initial_udp_glucose
    maps_to: udg
    label: Initial Udp Glucose
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `udg`.
  - name: initial_glucose_1_phosphate
    maps_to: g1p
    label: Initial Glucose 1 Phosphate
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `g1p`.
  - name: initial_glucose_2
    maps_to: glc
    label: Initial Glucose 2
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `glc`.
  - name: initial_model_state_atp
    maps_to: atp
    label: Initial Model State ATP
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `atp`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: glucose
    maps_to: glx
    label: glucose
    description: glucose. Maps to SBML symbol `glx`.
  - name: glucose_6_phosphate
    maps_to: g6p
    label: glucose 6-phosphate
    description: glucose 6-phosphate. Maps to SBML symbol `g6p`.
  - name: udp_glucose
    maps_to: udg
    label: UDP glucose
    description: UDP glucose. Maps to SBML symbol `udg`.
  - name: glucose_1_phosphate
    maps_to: g1p
    label: glucose 1-phosphate
    description: glucose 1-phosphate. Maps to SBML symbol `g1p`.
  - name: glucose_2
    maps_to: glc
    label: glucose
    description: glucose. Maps to SBML symbol `glc`.
  - name: atp
    maps_to: atp
    label: ATP
    description: ATP. Maps to SBML symbol `atp`.
