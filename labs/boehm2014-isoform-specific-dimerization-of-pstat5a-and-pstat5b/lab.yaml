schema_version: '2.0'
title: Boehm2014 Isoform Specific Dimerization Of Pstat5a And Pstat5b Lab
description: Boehm2014 - isoform-specific dimerization of pSTAT5A and pSTAT5B To study
  STAT5 activation, the authors build a dynamic model of pSTAT5 isoform dimerization.
  It can be used to explore systemsbiology boehm2014 isoform specific dimerization
  of dynamics and compare simulation behavior across conditions.
