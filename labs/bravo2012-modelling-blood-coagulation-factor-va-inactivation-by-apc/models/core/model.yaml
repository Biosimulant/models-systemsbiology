schema_version: '2.0'
title: Bravo2012 - Modelling blood coagulation factor Va inactivation by APC
description: Mathematical model of blood coagulation factor Va and Va fragment inactivation
  by APC, reactions with Xa and prothrombinase-prothrombin complex formation. It can
  be used to explore systemsbiology bravo2012 modelling blood coagulation factor dynamics
  and compare simulation behavior across conditions.
standard: other
tags:
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Maria Cristina Bravo
- Thomas Orfeo
- Kenneth G Mann
- Stephen J Everse
upstream:
  id: biomodels_ebi:BIOMD0000000739
  source_db: biomodels_ebi
  source_id: BIOMD0000000739
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000739
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000739?filename=Bravo2012.xml
  license: CC0
biosim:
