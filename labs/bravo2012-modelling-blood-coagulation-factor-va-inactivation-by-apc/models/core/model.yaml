      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Xa_Va_i_306_PT`.
  - name: initial_xa_va_i_306_506_pt
    maps_to: Xa_Va_i_306_506_PT
    label: Initial Xa Va I 306 506 Pt
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Xa_Va_i_306_506_PT`.
  - name: initial_xa_va_i_306_506
    maps_to: Xa_Va_i_306_506
    label: Initial Xa Va I 306 506
