  circadian clocks using the Arrhenius equation and a reconstructed model from Chlamydomonas
  reinhardtii Ines Heiland, Christian Boden. It can be used to explore systemsbiology
  heiland2012 circadianclock c reinhardtii BioModels0000000411 dynamics and compare
  simulation behavior across conditions.'
