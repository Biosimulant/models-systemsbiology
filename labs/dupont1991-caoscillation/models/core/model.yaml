schema_version: '2.0'
title: Dupont1991_CaOscillation
description: 'This model is according to the paper Signal-induced Ca2+ oscillations:
  Properties of a model based on Ca2+-induced Ca2+ release. Figure4B in the paper
  has been reproduced by RoadRunner and MathSBML.'
standard: other
tags:
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- G Dupont
- M J Berridge
- A Goldbeter
upstream:
  id: biomodels_ebi:BIOMD0000000117
  source_db: biomodels_ebi
  source_id: BIOMD0000000117
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000117
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000117?filename=BIOMD0000000117_url.xml
  license: CC0
biosim:
  entrypoint: src.dupont1991_caoscillation_biomd0000000117_model:Dupont1991CaoscillationBiomd0000000117Model
  init_kwargs:
    model_path: data/BIOMD0000000117.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
io:
  inputs:
  - name: initial_ca_in_the_ins_p3_insensitive_pool
    maps_to: y
    label: Initial Ca In The Ins P3 Insensitive Pool
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `y`.
  - name: initial_ca_in_the_cytosol
    maps_to: z
    label: Initial Ca In The Cytosol
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `z`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: ca_in_the_ins_p3_insensitive_pool
    maps_to: y
    label: Ca in the InsP3-insensitive pool
    description: Ca in the InsP3-insensitive pool. Maps to SBML symbol `y`.
  - name: ca_in_the_cytosol
    maps_to: z
    label: Ca in the cytosol
    description: Ca in the cytosol. Maps to SBML symbol `z`.
