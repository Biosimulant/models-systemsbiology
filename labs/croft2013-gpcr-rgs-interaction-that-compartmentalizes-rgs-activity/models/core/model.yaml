schema_version: '2.0'
title: Croft2013 - GPCR-RGS interaction that compartmentalizes RGS activity
description: Croft2013 - GPCR-RGS interaction that compartmentalizes RGS activity
  Through modelling studies, the classic quaternary complex (ligand-GPCR-G-RGS) has
  been extended to include an additional layer of r. It can be used to explore systemsbiology
  croft2013 gpcr rgs interaction that dynamics and compare simulation behavior across
  conditions.
