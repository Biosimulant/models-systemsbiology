schema_version: '2.0'
title: Mitrophanov2015 - Simulating extended Hockin Blood Coagulation Model under
  varied pH
description: Mathematical model of the blood coagulation cascade with new kinetic
  rates to simulate acidosis. It can be used to explore systemsbiology mitrophanov2015
  simulating extended hockin blood dynamics and compare simulation behavior across
  conditions.
