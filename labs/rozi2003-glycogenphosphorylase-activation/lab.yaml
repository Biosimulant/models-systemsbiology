schema_version: '2.0'
title: Rozi2003 Glycogenphosphorylase Activation Lab
description: The model reproduces the temporal evolution of Glycogen phosphorylase
  for a vale of Vm5=30 as depicted in Fig 1a of the paper. The model makes use of
  calcium oscillations from the Borghans model to st.
models:
- alias: systemsbiology_sbml_rozi2003_glycogenphosphorylase_activation_biomd0000000100_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: systemsbiology_sbml_rozi2003_glycogenphosphorylase_activation_biomd0000000100_model.state
  to:
  - visualisation.systemsbiology_sbml_rozi2003_glycogenphosphorylase_activation_biomd0000000100_model_state
- from: systemsbiology_sbml_rozi2003_glycogenphosphorylase_activation_biomd0000000100_model.summary
  to:
  - visualisation.systemsbiology_sbml_rozi2003_glycogenphosphorylase_activation_biomd0000000100_model_summary
- from: systemsbiology_sbml_rozi2003_glycogenphosphorylase_activation_biomd0000000100_model.species_labels
  to:
  - visualisation.systemsbiology_sbml_rozi2003_glycogenphosphorylase_activation_biomd0000000100_model_species_labels
runtime:
  duration: 1.0
  communication_step: 0.1
  initial_inputs: {}
tags:
- physiology
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
io:
  inputs:
  - name: initial_extracellular_calcium
    maps_to: systemsbiology_sbml_rozi2003_glycogenphosphorylase_activation_biomd0000000100_model.initial_extracellular_calcium
    label: Initial Extracellular Calcium
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `EC`.
  - name: initial_glycogen_phosphorylase
    maps_to: systemsbiology_sbml_rozi2003_glycogenphosphorylase_activation_biomd0000000100_model.initial_glycogen_phosphorylase
    label: Initial Glycogen Phosphorylase
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `GP`.
  - name: initial_model_state_ip3
    maps_to: systemsbiology_sbml_rozi2003_glycogenphosphorylase_activation_biomd0000000100_model.initial_model_state_ip3
    label: Initial Model State IP3
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `A`.
  - name: initial_intravesicular_calcium
    maps_to: systemsbiology_sbml_rozi2003_glycogenphosphorylase_activation_biomd0000000100_model.initial_intravesicular_calcium
    label: Initial Intravesicular Calcium
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Y`.
  - name: initial_cytosolic_calcium
    maps_to: systemsbiology_sbml_rozi2003_glycogenphosphorylase_activation_biomd0000000100_model.initial_cytosolic_calcium
    label: Initial Cytosolic Calcium
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Z`.
  outputs:
  - name: state
    maps_to: systemsbiology_sbml_rozi2003_glycogenphosphorylase_activation_biomd0000000100_model.state
  - name: summary
    maps_to: systemsbiology_sbml_rozi2003_glycogenphosphorylase_activation_biomd0000000100_model.summary
  - name: species_labels
    maps_to: systemsbiology_sbml_rozi2003_glycogenphosphorylase_activation_biomd0000000100_model.species_labels
  - name: extracellular_calcium
    maps_to: systemsbiology_sbml_rozi2003_glycogenphosphorylase_activation_biomd0000000100_model.extracellular_calcium
  - name: glycogen_phosphorylase
    maps_to: systemsbiology_sbml_rozi2003_glycogenphosphorylase_activation_biomd0000000100_model.glycogen_phosphorylase
  - name: ip3
    maps_to: systemsbiology_sbml_rozi2003_glycogenphosphorylase_activation_biomd0000000100_model.ip3
  - name: intravesicular_calcium
    maps_to: systemsbiology_sbml_rozi2003_glycogenphosphorylase_activation_biomd0000000100_model.intravesicular_calcium
