schema_version: '2.0'
title: Sass2009 - Approach to an α-synuclein-based BST model of Parkinson's disease
description: 'Sass2009 - Approach to anα-synuclein-based BST model of Parkinson''s
  disease This model is described in the article: A pragmatic approach to biochemical
  systems theory applied to an alpha-synuclein-bas. It can be used to explore systemsbiology
  sass2009 approach to an synuclein dynamics and compare simulation behavior across
  conditions.'
