schema_version: '2.0'
title: Goldbeter1990_CalciumSpike_CICR
description: The model reproduces the time profile of cytosolic and intracellular
  calcium as depicted in the upper panel of Fig 2 in the paper. The model was successfully
  tested on MathSBML and Jarnac.
standard: other
tags:
- generegulation
- physiology
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- A Goldbeter
- G Dupont
- M J Berridge
upstream:
  id: biomodels_ebi:BIOMD0000000098
  source_db: biomodels_ebi
  source_id: BIOMD0000000098
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000098
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000098?filename=BIOMD0000000098_url.xml
  license: CC0
biosim:
  entrypoint: src.goldbeter1990_calciumspike_cicr_biomd0000000098_model:Goldbeter1990CalciumspikeCicrBiomd0000000098Model
  init_kwargs:
    model_path: data/BIOMD0000000098.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
io:
  inputs:
  - name: initial_model_state_y
    maps_to: Y
    label: Initial Model State Y
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Y`.
  - name: initial_model_state_z
    maps_to: Z
    label: Initial Model State Z
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Z`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: model_state_y
    maps_to: Y
    label: Y
    description: Y. Maps to SBML symbol `Y`.
  - name: model_state_z
    maps_to: Z
    label: Z
    description: Z. Maps to SBML symbol `Z`.
