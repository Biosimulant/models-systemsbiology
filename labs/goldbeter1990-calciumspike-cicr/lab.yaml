schema_version: '2.0'
title: Goldbeter1990 Calciumspike Cicr Lab
description: The model reproduces the time profile of cytosolic and intracellular
  calcium as depicted in the upper panel of Fig 2 in the paper. The model was successfully
  tested on MathSBML and Jarnac.
models:
- alias: systemsbiology_sbml_goldbeter1990_calciumspike_cicr_biomd0000000098_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: systemsbiology_sbml_goldbeter1990_calciumspike_cicr_biomd0000000098_model.state
  to:
  - visualisation.systemsbiology_sbml_goldbeter1990_calciumspike_cicr_biomd0000000098_model_state
- from: systemsbiology_sbml_goldbeter1990_calciumspike_cicr_biomd0000000098_model.summary
  to:
  - visualisation.systemsbiology_sbml_goldbeter1990_calciumspike_cicr_biomd0000000098_model_summary
- from: systemsbiology_sbml_goldbeter1990_calciumspike_cicr_biomd0000000098_model.species_labels
  to:
  - visualisation.systemsbiology_sbml_goldbeter1990_calciumspike_cicr_biomd0000000098_model_species_labels
runtime:
  duration: 1.0
  communication_step: 0.1
  initial_inputs: {}
tags:
- generegulation
- physiology
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
io:
  inputs:
  - name: initial_model_state_y
    maps_to: systemsbiology_sbml_goldbeter1990_calciumspike_cicr_biomd0000000098_model.initial_model_state_y
    label: Initial Model State Y
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Y`.
  - name: initial_model_state_z
    maps_to: systemsbiology_sbml_goldbeter1990_calciumspike_cicr_biomd0000000098_model.initial_model_state_z
    label: Initial Model State Z
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Z`.
  outputs:
  - name: state
    maps_to: systemsbiology_sbml_goldbeter1990_calciumspike_cicr_biomd0000000098_model.state
  - name: summary
    maps_to: systemsbiology_sbml_goldbeter1990_calciumspike_cicr_biomd0000000098_model.summary
  - name: species_labels
    maps_to: systemsbiology_sbml_goldbeter1990_calciumspike_cicr_biomd0000000098_model.species_labels
  - name: model_state_y
    maps_to: systemsbiology_sbml_goldbeter1990_calciumspike_cicr_biomd0000000098_model.model_state_y
  - name: model_state_z
    maps_to: systemsbiology_sbml_goldbeter1990_calciumspike_cicr_biomd0000000098_model.model_state_z
