schema_version: '2.0'
title: Morris1981_MuscleFibre_Voltage_reduced
description: 'This is the reduced model of the voltage oscillations in barnacle muscle
  fibers, generally known as the Morris-Lecar model (eg. wikipedia ), described in
  the article: Voltage oscillations in the barna.'
standard: other
tags:
- generegulation
- physiology
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- C Morris
- H Lecar
upstream:
  id: biomodels_ebi:BIOMD0000000280
  source_db: biomodels_ebi
  source_id: BIOMD0000000280
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000280
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000280?filename=BIOMD0000000280_url.xml
  license: CC0
biosim:
  entrypoint: src.morris1981_musclefibre_voltage_reduced_biomd0000000280_model:Morris1981MusclefibreVoltageReducedBiomd0000000280Model
  init_kwargs:
    model_path: data/BIOMD0000000280.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
io:
  inputs:
  - name: initial_model_state_v
    maps_to: V
    label: Initial Model State V
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `V`.
  - name: initial_model_state_n
    maps_to: N
    label: Initial Model State N
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `N`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: model_state_v
    maps_to: V
    label: V
    description: V. Maps to SBML symbol `V`.
  - name: model_state_n
    maps_to: N
    label: N
    description: N. Maps to SBML symbol `N`.
