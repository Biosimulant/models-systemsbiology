schema_version: '2.0'
title: McLean1991 - Behaviour of HIV in the presence of zidovudine
description: A new mechanism is proposed for the apparent breakthrough of HIV that
  occurs approximately 6 months after the commencement of therapy with zidovudine
  (AZT). It can be used to explore systemsbiology mclean1991 behaviour of hiv in dynamics
  and compare simulation behavior across conditions.
