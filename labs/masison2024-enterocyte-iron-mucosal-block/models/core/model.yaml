schema_version: '2.0'
title: Masison2024 - Enterocyte Iron Mucosal Block
description: Enterocyte Iron Mucosal Block This is a model of enterocyte iron absorption,
  consisting of iron uptake (movement of iron from intestinal lumen into cytplasm),
  and transfer (transport of iron from cyto. It can be used to explore systemsbiology
  masison2024 enterocyte iron mucosal block dynamics and compare simulation behavior
  across conditions.
