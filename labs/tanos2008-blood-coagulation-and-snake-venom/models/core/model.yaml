schema_version: '2.0'
title: Tanos2008 - Blood coagulation and Snake Venom
description: Mathematical model of the blood coagulation cascade including interaction
  of snake venom and antivenom. It can be used to explore systemsbiology tanos2008
  blood coagulation and snake dynamics and compare simulation behavior across conditions.
standard: other
tags:
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- P P Tanos
- G K Isbister
- D G Lalloo
- C M J Kirkpatrick
- S B Duffull
