schema_version: '2.0'
title: Thomsen1989_AdenylateCyclase
description: This model reproduces figure 5 and figure 4(B)of the paper, with Kinh
  represented by [G-GTP]. It can be used to explore systemsbiology thomsen1989 adenylatecyclase
  BioModels0000000080 dynamics and compare simulation behavior across conditions.
