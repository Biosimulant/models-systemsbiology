  - name: caspase_9_xiap_complex
    maps_to: systemsbiology_sbml_legewie2006_apoptosis_wt_biomd0000000102_model.caspase_9_xiap_complex
  - name: caspase_9_cleaved_xiap_complex
    maps_to: systemsbiology_sbml_legewie2006_apoptosis_wt_biomd0000000102_model.caspase_9_cleaved_xiap_complex
  - name: caspase_9_cleaved
    maps_to: systemsbiology_sbml_legewie2006_apoptosis_wt_biomd0000000102_model.caspase_9_cleaved
  - name: caspase_3_cleaved_xiap_complex
