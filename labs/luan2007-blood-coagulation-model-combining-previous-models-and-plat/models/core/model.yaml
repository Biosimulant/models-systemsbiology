schema_version: '2.0'
title: Luan2007 - Blood coagulation model combining previous models and platelet activation
description: Mathematical model combining previous models (Jones1994, Leipoldt1995,
  Kuhursky2001, Hockin2002) into one model with platelet activation. It can be used
  to explore systemsbiology luan2007 blood coagulation combining previ dynamics and
  compare simulation behavior across conditions.
standard: other
tags:
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
