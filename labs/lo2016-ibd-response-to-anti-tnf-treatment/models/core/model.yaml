schema_version: '2.0'
title: Lo2016 – IBD Response to Anti-TNFα treatment
description: Systems Biology Lo2016Ibd Response To Anti Tnf Treatment Model2505090001Model
  captures core biological behavior in the context of systemsbiology, sbml, biomodels_ebi
  using a biomodels_ebi-sourced OTHER model. When you run it, you can observe state
  and evaluate how the modeled system changes across runs.
standard: other
tags:
- immunology
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Wing-Cheong Lo
- Violeta Arsenescu
- Razvan I Arsenescu
- Avner Friedman
upstream:
  id: biomodels_ebi:MODEL2505090001
  source_db: biomodels_ebi
  source_id: MODEL2505090001
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/MODEL2505090001
  download_url: https://www.ebi.ac.uk/biomodels/model/download/MODEL2505090001?filename=team_2016_final_model_lo2016.xml
  license: CC0
biosim:
  entrypoint: src.lo2016_ibd_response_to_anti_tnf_treatment_model2505090001_model:Lo2016IbdResponseToAntiTnfTreatmentModel2505090001Model
  init_kwargs:
    model_path: data/MODEL2505090001.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
io:
  inputs:
  - name: initial_model_state_t17
    maps_to: T17_0
    label: Initial Model State T17
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `T17_0`.
  - name: initial_model_state_tr
    maps_to: Tr_0
    label: Initial Model State Tr
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Tr_0`.
  - name: initial_model_state_m
    maps_to: M_0
    label: Initial Model State M
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `M_0`.
  - name: initial_model_state_t1
    maps_to: T1_0
    label: Initial Model State T1
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `T1_0`.
  - name: initial_model_state_m2
    maps_to: M2_0
    label: Initial Model State M2
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `M2_0`.
  - name: initial_model_state_m1
    maps_to: M1_0
    label: Initial Model State M1
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `M1_0`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: t17
    maps_to: T17_0
    label: T17
    description: T17. Maps to SBML symbol `T17_0`.
  - name: model_state_tr
    maps_to: Tr_0
    label: Tr
    description: Tr. Maps to SBML symbol `Tr_0`.
  - name: model_state_m
    maps_to: M_0
    label: M
    description: M. Maps to SBML symbol `M_0`.
  - name: model_state_t1
    maps_to: T1_0
    label: T1
    description: T1. Maps to SBML symbol `T1_0`.
  - name: model_state_m2
    maps_to: M2_0
    label: M2
    description: M2. Maps to SBML symbol `M2_0`.
  - name: model_state_m1
    maps_to: M1_0
    label: M1
    description: M1. Maps to SBML symbol `M1_0`.
