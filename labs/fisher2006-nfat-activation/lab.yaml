schema_version: '2.0'
title: Fisher2006 Nfat Activation Lab
description: The model reproduces the kinetics of the nuclear factor of activated
  cells (NFAT) as depicted in Figure 3a of the paper. Model was successfully tested
  on Jarnac and MathSBML To the extent possible und.
models:
- alias: systemsbiology_sbml_fisher2006_nfat_activation_biomd0000000123_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: systemsbiology_sbml_fisher2006_nfat_activation_biomd0000000123_model.state
  to:
  - visualisation.systemsbiology_sbml_fisher2006_nfat_activation_biomd0000000123_model_state
- from: systemsbiology_sbml_fisher2006_nfat_activation_biomd0000000123_model.summary
  to:
  - visualisation.systemsbiology_sbml_fisher2006_nfat_activation_biomd0000000123_model_summary
- from: systemsbiology_sbml_fisher2006_nfat_activation_biomd0000000123_model.species_labels
  to:
  - visualisation.systemsbiology_sbml_fisher2006_nfat_activation_biomd0000000123_model_species_labels
runtime:
  duration: 1.0
  communication_step: 0.1
  initial_inputs: {}
tags:
- generegulation
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
io:
