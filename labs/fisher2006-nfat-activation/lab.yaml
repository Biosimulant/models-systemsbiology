  - name: initial_inactive_calcineurin_in_nucleus
    maps_to: systemsbiology_sbml_fisher2006_nfat_activation_biomd0000000123_model.initial_inactive_calcineurin_in_nucleus
    label: Initial Inactive Calcineurin In Nucleus
