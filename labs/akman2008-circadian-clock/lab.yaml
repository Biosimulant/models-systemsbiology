    maps_to: systemsbiology_sbml_akman2008_circadian_clock_model2_biomd0000000214_model.state
  - name: summary
    maps_to: systemsbiology_sbml_akman2008_circadian_clock_model2_biomd0000000214_model.summary
  - name: species_labels
    maps_to: systemsbiology_sbml_akman2008_circadian_clock_model2_biomd0000000214_model.species_labels
  - name: wc_1_mrna
    maps_to: systemsbiology_sbml_akman2008_circadian_clock_model2_biomd0000000214_model.wc_1_mrna
