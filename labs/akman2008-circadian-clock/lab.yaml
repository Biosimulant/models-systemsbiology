    maps_to: systemsbiology_sbml_akman2008_circadian_clock_model2_biomd0000000214_model.wc_1_1
  - name: wc_1_2
    maps_to: systemsbiology_sbml_akman2008_circadian_clock_model2_biomd0000000214_model.wc_1_2
