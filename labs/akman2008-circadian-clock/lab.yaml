  - name: initial_l_frq_1
    maps_to: systemsbiology_sbml_akman2008_circadian_clock_model2_biomd0000000214_model.initial_l_frq_1
    label: Initial L Frq 1
    description: Source state initial condition exposed as a model-specific control
