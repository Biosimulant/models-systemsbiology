    maps_to: MW
    label: Initial Wc 1 MRNA
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `MW`.
  - name: initial_frq_mrna
    maps_to: MF
    label: Initial Frq MRNA
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `MF`.
  - name: initial_wc_1
    maps_to: PW
    label: Initial Wc 1
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `PW`.
  - name: initial_wc_1_1
    maps_to: E1W
    label: Initial Wc 1 1
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `E1W`.
  - name: initial_wc_1_2
    maps_to: E2W
    label: Initial Wc 1 2
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `E2W`.
  - name: initial_l_frq_1
    maps_to: E1Fp
    label: Initial L Frq 1
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `E1Fp`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: wc_1_mrna
    maps_to: MW
    label: WC-1 mRNA
    description: WC-1 mRNA. Maps to SBML symbol `MW`.
  - name: frq_mrna
    maps_to: MF
    label: Frq mRNA
    description: Frq mRNA. Maps to SBML symbol `MF`.
  - name: wc_1
    maps_to: PW
    label: WC-1
    description: WC-1. Maps to SBML symbol `PW`.
  - name: wc_1_1
    maps_to: E1W
    label: WC-1_1
    description: WC-1_1. Maps to SBML symbol `E1W`.
  - name: wc_1_2
    maps_to: E2W
    label: WC-1_2
    description: WC-1_2. Maps to SBML symbol `E2W`.
  - name: l_frq_1
    maps_to: E1Fp
    label: l-Frq_1
    description: l-Frq_1. Maps to SBML symbol `E1Fp`.
