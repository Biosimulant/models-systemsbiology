schema_version: '2.0'
title: Lavrentovich2008 Ca Oscillations Lab
description: The model reproduces the time profile of cytoplasmic Calcium as depicted
  in Fig 3 of the paper. It can be used to explore systemsbiology lavrentovich2008
  ca oscillations BioModels0000000184 dynamics and compare simulation behavior across
  conditions.
models:
- alias: systemsbiology_sbml_lavrentovich2008_ca_oscillations_biomd0000000184_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: systemsbiology_sbml_lavrentovich2008_ca_oscillations_biomd0000000184_model.state
  to:
  - visualisation.systemsbiology_sbml_lavrentovich2008_ca_oscillations_biomd0000000184_model_state
- from: systemsbiology_sbml_lavrentovich2008_ca_oscillations_biomd0000000184_model.summary
  to:
  - visualisation.systemsbiology_sbml_lavrentovich2008_ca_oscillations_biomd0000000184_model_summary
- from: systemsbiology_sbml_lavrentovich2008_ca_oscillations_biomd0000000184_model.species_labels
  to:
  - visualisation.systemsbiology_sbml_lavrentovich2008_ca_oscillations_biomd0000000184_model_species_labels
runtime:
  duration: 1.0
  communication_step: 0.1
  initial_inputs: {}
tags:
- physiology
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
io:
  inputs:
  - name: initial_calcium_in_er
    maps_to: systemsbiology_sbml_lavrentovich2008_ca_oscillations_biomd0000000184_model.initial_calcium_in_er
    label: Initial Calcium In Er
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Y`.
  - name: initial_model_state_ip3
    maps_to: systemsbiology_sbml_lavrentovich2008_ca_oscillations_biomd0000000184_model.initial_model_state_ip3
    label: Initial Model State IP3
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Z`.
  - name: initial_cytoplasmic_calcium
    maps_to: systemsbiology_sbml_lavrentovich2008_ca_oscillations_biomd0000000184_model.initial_cytoplasmic_calcium
    label: Initial Cytoplasmic Calcium
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `X`.
  outputs:
  - name: state
    maps_to: systemsbiology_sbml_lavrentovich2008_ca_oscillations_biomd0000000184_model.state
  - name: summary
    maps_to: systemsbiology_sbml_lavrentovich2008_ca_oscillations_biomd0000000184_model.summary
  - name: species_labels
    maps_to: systemsbiology_sbml_lavrentovich2008_ca_oscillations_biomd0000000184_model.species_labels
  - name: calcium_in_er
    maps_to: systemsbiology_sbml_lavrentovich2008_ca_oscillations_biomd0000000184_model.calcium_in_er
  - name: ip3
    maps_to: systemsbiology_sbml_lavrentovich2008_ca_oscillations_biomd0000000184_model.ip3
  - name: cytoplasmic_calcium
    maps_to: systemsbiology_sbml_lavrentovich2008_ca_oscillations_biomd0000000184_model.cytoplasmic_calcium
