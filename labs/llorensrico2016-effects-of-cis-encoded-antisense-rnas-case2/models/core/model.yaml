description: 'LlorénsRico2016 - Effects of cis-Encodedantisense RNAs (asRNAs) - Case1
  Three putative effects of the asRNAs were considered in this study: in case 1 ,
  the binding of the asRNA to the corresponding mR. It can be used to explore systemsbiology
  llor nsrico2016 effects of cis dynamics and compare simulation behavior across conditions.'
