schema_version: '2.0'
title: Parmar2019 - Iron Mouse PV3 - tracer
description: Iron Mouse PV3 'A computational model to understand mouse iron physiology
  and diseases' By Jignesh Parmar and Pedro Mendes Parameter estimation using radioactive
  tracer data This is a dynamic model of. It can be used to explore systemsbiology
  parmar2019 iron mouse pv3 tracer dynamics and compare simulation behavior across
  conditions.
standard: other
tags:
- physiology
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Jignesh H Parmar
- Pedro Mendes
upstream:
  id: biomodels_ebi:MODEL1805140002
  source_db: biomodels_ebi
  source_id: MODEL1805140002
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/MODEL1805140002
  download_url: https://www.ebi.ac.uk/biomodels/model/download/MODEL1805140002?filename=IronMousePV3_tracer.xml
  license: CC0
biosim:
  entrypoint: src.parmar2019_iron_mouse_pv3_tracer_model1805140002_model:Parmar2019IronMousePv3TracerModel1805140002Model
  init_kwargs:
    model_path: data/MODEL1805140002.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
io:
  inputs:
  - name: initial_fe_rbc
    maps_to: FeRBC_0
    label: Initial Fe Rbc
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `FeRBC_0`.
  - name: initial_fe_duo
    maps_to: FeDuo_0
    label: Initial Fe Duo
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `FeDuo_0`.
  - name: initial_fe_spleen
    maps_to: FeSpleen_0
    label: Initial Fe Spleen
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `FeSpleen_0`.
  - name: initial_fe_liver
    maps_to: FeLiver_0
    label: Initial Fe Liver
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `FeLiver_0`.
  - name: initial_fe_rest
    maps_to: FeRest_0
    label: Initial Fe Rest
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `FeRest_0`.
  - name: initial_fe2_tf
    maps_to: Fe2Tf_0
    label: Initial FE2 Tf
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Fe2Tf_0`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: fe_rbc
    maps_to: FeRBC_0
    label: FeRBC
    description: FeRBC. Maps to SBML symbol `FeRBC_0`.
  - name: fe_duo
    maps_to: FeDuo_0
    label: FeDuo
    description: FeDuo. Maps to SBML symbol `FeDuo_0`.
  - name: fe_spleen
    maps_to: FeSpleen_0
    label: FeSpleen
    description: FeSpleen. Maps to SBML symbol `FeSpleen_0`.
  - name: fe_liver
    maps_to: FeLiver_0
    label: FeLiver
