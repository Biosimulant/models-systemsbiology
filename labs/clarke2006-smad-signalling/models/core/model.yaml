io:
  inputs:
  - name: initial_r_smad_cyt
    maps_to: R_smad_cyt
    label: Initial R Smad Cyt
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `R_smad_cyt`.
  - name: initial_smad4_cyt
    maps_to: smad4_cyt
    label: Initial Smad4 Cyt
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `smad4_cyt`.
  - name: initial_smad4_nuc
    maps_to: smad4_nuc
    label: Initial Smad4 Nuc
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `smad4_nuc`.
  - name: initial_r_smad_nuc
    maps_to: R_smad_nuc
    label: Initial R Smad Nuc
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `R_smad_nuc`.
  - name: initial_receptors
    maps_to: receptor
    label: Initial Receptors
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `receptor`.
  - name: initial_r_smad_p_nuc
    maps_to: R_smad_P_nuc
    label: Initial R Smad P Nuc
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `R_smad_P_nuc`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: r_smad_cyt
    maps_to: R_smad_cyt
    label: R-Smad_cyt
    description: R-Smad_cyt. Maps to SBML symbol `R_smad_cyt`.
  - name: smad4_cyt
    maps_to: smad4_cyt
    label: Smad4_cyt
    description: Smad4_cyt. Maps to SBML symbol `smad4_cyt`.
  - name: smad4_nuc
    maps_to: smad4_nuc
    label: Smad4_nuc
    description: Smad4_nuc. Maps to SBML symbol `smad4_nuc`.
  - name: r_smad_nuc
    maps_to: R_smad_nuc
    label: R-Smad_nuc
    description: R-Smad_nuc. Maps to SBML symbol `R_smad_nuc`.
  - name: receptors
    maps_to: receptor
    label: receptors
    description: receptors. Maps to SBML symbol `receptor`.
  - name: r_smad_p_nuc
    maps_to: R_smad_P_nuc
    label: R-Smad-P_nuc
    description: R-Smad-P_nuc. Maps to SBML symbol `R_smad_P_nuc`.
