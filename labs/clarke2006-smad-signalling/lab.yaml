schema_version: '2.0'
title: Clarke2006 Smad Signalling Lab
description: The model reproduces the temporal evolution of four variables depicted
  in Fig 2a. It can be used to explore systemsbiology clarke2006 smad signalling BioModels0000000112
  dynamics and compare simulation behavior across conditions.
models:
- alias: systemsbiology_sbml_clarke2006_smad_signalling_biomd0000000112_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: systemsbiology_sbml_clarke2006_smad_signalling_biomd0000000112_model.state
  to:
  - visualisation.systemsbiology_sbml_clarke2006_smad_signalling_biomd0000000112_model_state
- from: systemsbiology_sbml_clarke2006_smad_signalling_biomd0000000112_model.summary
  to:
  - visualisation.systemsbiology_sbml_clarke2006_smad_signalling_biomd0000000112_model_summary
- from: systemsbiology_sbml_clarke2006_smad_signalling_biomd0000000112_model.species_labels
  to:
  - visualisation.systemsbiology_sbml_clarke2006_smad_signalling_biomd0000000112_model_species_labels
runtime:
  duration: 1.0
  communication_step: 0.1
  initial_inputs: {}
tags:
- signaling
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
io:
  inputs:
  - name: initial_r_smad_cyt
    maps_to: systemsbiology_sbml_clarke2006_smad_signalling_biomd0000000112_model.initial_r_smad_cyt
    label: Initial R Smad Cyt
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `R_smad_cyt`.
  - name: initial_smad4_cyt
    maps_to: systemsbiology_sbml_clarke2006_smad_signalling_biomd0000000112_model.initial_smad4_cyt
