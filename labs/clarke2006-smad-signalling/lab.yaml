  - name: summary
    maps_to: systemsbiology_sbml_clarke2006_smad_signalling_biomd0000000112_model.summary
  - name: species_labels
    maps_to: systemsbiology_sbml_clarke2006_smad_signalling_biomd0000000112_model.species_labels
