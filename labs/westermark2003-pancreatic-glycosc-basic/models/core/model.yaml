  license: CC0
biosim:
  entrypoint: src.westermark2003_pancreatic_glycosc_basic_biomd0000000225_model:Westermark2003PancreaticGlycoscBasicBiomd0000000225Model
  init_kwargs:
    model_path: data/BIOMD0000000225.xml
