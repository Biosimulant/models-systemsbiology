io:
  inputs:
  - name: initial_g6_p_f6_p
    maps_to: G6P_F6P
    label: Initial G6 P F6 P
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `G6P_F6P`.
  - name: initial_model_state_glc
    maps_to: GLC
    label: Initial Model State Glc
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `GLC`.
  - name: initial_model_state_fbp
    maps_to: FBP
    label: Initial Model State Fbp
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `FBP`.
  - name: initial_g3_p
    maps_to: G3P
    label: Initial G3 P
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `G3P`.
  - name: initial_f6_p
    maps_to: F6P
    label: Initial F6 P
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `F6P`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: g6_p_f6_p
    maps_to: G6P_F6P
    label: G6P_F6P
    description: G6P_F6P. Maps to SBML symbol `G6P_F6P`.
  - name: glc
    maps_to: GLC
    label: GLC
    description: GLC. Maps to SBML symbol `GLC`.
  - name: fbp
    maps_to: FBP
    label: FBP
    description: FBP. Maps to SBML symbol `FBP`.
  - name: g3_p
    maps_to: G3P
    label: G3P
    description: G3P. Maps to SBML symbol `G3P`.
  - name: f6_p
    maps_to: F6P
    label: F6P
    description: F6P. Maps to SBML symbol `F6P`.
