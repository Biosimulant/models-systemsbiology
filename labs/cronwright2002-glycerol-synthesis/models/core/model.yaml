  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: glycerol
    maps_to: Gly
    label: Glycerol
    description: Glycerol. Maps to SBML symbol `Gly`.
  - name: glycerol_3_phosphate
    maps_to: G3P
    label: Glycerol 3-phosphate
    description: Glycerol 3-phosphate. Maps to SBML symbol `G3P`.
  - name: dhap
    maps_to: DHAP
    label: DHAP
    description: DHAP. Maps to SBML symbol `DHAP`.
