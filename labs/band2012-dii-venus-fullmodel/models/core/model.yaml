schema_version: '2.0'
title: Band2012_DII-Venus_FullModel
description: 'This model is from the article: Root gravitropism is regulated by a
  transient lateral auxin gradient controlled by a tipping-point mechanism. Band LR,
  Wells DM, Larrieu A, Sun J, Middleton AM, French.'
standard: other
tags:
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Leah R Band
- Darren M Wells
- Antoine Larrieu
- Jianyong Sun
- Alistair M Middleton
upstream:
  id: biomodels_ebi:BIOMD0000000413
  source_db: biomodels_ebi
  source_id: BIOMD0000000413
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000413
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000413?filename=BIOMD0000000413_url.xml
  license: CC0
biosim:
  entrypoint: src.band2012_dii_venus_fullmodel_biomd0000000413_model:Band2012DiiVenusFullmodelBiomd0000000413Model
  init_kwargs:
    model_path: data/BIOMD0000000413.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
io:
  inputs:
  - name: initial_venus
    maps_to: VENUS
    label: Initial Venus
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `VENUS`.
  - name: initial_tir1
    maps_to: TIR1
    label: Initial Tir1
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `TIR1`.
  - name: initial_auxin
    maps_to: auxin
    label: Initial Auxin
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `auxin`.
  - name: initial_auxin_tir1_venus
    maps_to: auxinTIR1VENUS
    label: Initial Auxin Tir1 Venus
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `auxinTIR1VENUS`.
  - name: initial_auxin_tir1
    maps_to: auxinTIR1
    label: Initial Auxin Tir1
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `auxinTIR1`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: venus
    maps_to: VENUS
    label: VENUS
    description: VENUS. Maps to SBML symbol `VENUS`.
  - name: tir1
    maps_to: TIR1
    label: TIR1
    description: TIR1. Maps to SBML symbol `TIR1`.
  - name: auxin
    maps_to: auxin
    label: Auxin
    description: Auxin. Maps to SBML symbol `auxin`.
  - name: auxin_tir1_venus
    maps_to: auxinTIR1VENUS
    label: AuxinTIR1VENUS
    description: AuxinTIR1VENUS. Maps to SBML symbol `auxinTIR1VENUS`.
  - name: auxin_tir1
    maps_to: auxinTIR1
    label: AuxinTIR1
    description: AuxinTIR1. Maps to SBML symbol `auxinTIR1`.
