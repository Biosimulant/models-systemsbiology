  - visualisation.systemsbiology_sbml_band2012_dii_venus_fullmodel_biomd0000000413_model_species_labels
runtime:
  duration: 1.0
  communication_step: 0.1
  initial_inputs: {}
tags:
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
