    label: Initial Plb Dephosph
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `PLB_dephosph`.
  - name: initial_ltrpn
    maps_to: LTRPN
    label: Initial Ltrpn
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `LTRPN`.
  - name: initial_ca_serca
    maps_to: Ca_serca
    label: Initial Ca Serca
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Ca_serca`.
  - name: initial_ca_cyt
    maps_to: Ca_cyt
    label: Initial Ca Cyt
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Ca_cyt`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: plb_dephosph
    maps_to: PLB_dephosph
    label: PLB Dephosph
    description: PLB Dephosph. Maps to SBML symbol `PLB_dephosph`.
  - name: ltrpn
    maps_to: LTRPN
    label: LTRPN
    description: LTRPN. Maps to SBML symbol `LTRPN`.
  - name: ca_serca
    maps_to: Ca_serca
    label: Ca Serca
    description: Ca Serca. Maps to SBML symbol `Ca_serca`.
  - name: ca_cyt
    maps_to: Ca_cyt
    label: Ca Cyt
    description: Ca Cyt. Maps to SBML symbol `Ca_cyt`.
