schema_version: '2.0'
title: Jenkinson2011_EGF_MAPK
description: 'This is a model described in the article: Thermodynamically Consistent
  Model Calibration in Chemical Kinetics. It can be used to explore systemsbiology
  jenkinson2011 egf mapk BioModels0000000399 dynamics and compare simulation behavior
  across conditions.'
standard: other
tags:
- signaling
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Garrett Jenkinson
- John Goutsias
upstream:
