  source_db: biomodels_ebi
  source_id: BIOMD0000000399
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000399
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000399?filename=BIOMD0000000399_url.xml
  license: CC0
biosim:
