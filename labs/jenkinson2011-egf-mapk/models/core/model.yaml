  - name: initial_ras_gdp
    maps_to: x26
    label: Initial RAS Gdp
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `x26`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: mek
    maps_to: x47
    label: MEK
    description: MEK. Maps to SBML symbol `x47`.
  - name: erk
    maps_to: x55
    label: ERK
    description: ERK. Maps to SBML symbol `x55`.
  - name: phosphotase3
    maps_to: x60
    label: Phosphotase3
    description: Phosphotase3. Maps to SBML symbol `x60`.
  - name: shc
    maps_to: x31
    label: Shc
    description: Shc. Maps to SBML symbol `x31`.
  - name: prot
    maps_to: x12
    label: Prot
    description: Prot. Maps to SBML symbol `x12`.
  - name: ras_gdp
    maps_to: x26
