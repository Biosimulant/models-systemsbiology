  - name: initial_model_state_erk
    maps_to: x55
    label: Initial Model State ERK
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `x55`.
  - name: initial_phosphotase3
    maps_to: x60
    label: Initial Phosphotase3
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `x60`.
  - name: initial_model_state_shc
    maps_to: x31
    label: Initial Model State Shc
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `x31`.
  - name: initial_prot
    maps_to: x12
    label: Initial Prot
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
