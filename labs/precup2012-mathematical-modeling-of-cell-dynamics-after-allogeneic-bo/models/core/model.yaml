  - name: initial_model_state_z
    maps_to: z
    label: Initial Model State Z
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `z`.
  - name: initial_model_state_x
    maps_to: x
    label: Initial Model State X
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `x`.
  - name: initial_model_state_y
    maps_to: y
    label: Initial Model State Y
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `y`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: model_state_z
    maps_to: z
    label: z
    description: z. Maps to SBML symbol `z`.
  - name: model_state_x
    maps_to: x
    label: x
    description: x. Maps to SBML symbol `x`.
  - name: model_state_y
    maps_to: y
    label: y
    description: y. Maps to SBML symbol `y`.
