schema_version: '2.0'
title: Precup2012 Mathematical Modeling Of Cell Dynamics After Allogeneic Bo Lab
description: This is a basic mathematical model describing the dynamics of three cell
  lines (normal host cells, leukemic host cells and donor cells) after allogeneic
  stem cell transplantation. It can be used to explore systemsbiology precup2012 mathematical
  modeling of cell dynamics and compare simulation behavior across conditions.
