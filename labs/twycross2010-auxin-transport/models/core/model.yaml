schema_version: '2.0'
title: Twycross2010_Auxin_Transport
description: 'This is a model with 20 cells - 20 cytplasms and 21 apoplasts - as described
  in the article: Stochastic and deterministic multiscale models for systems biology:
  an auxin-transport case study. It can be used to explore systemsbiology twycross2010
  auxin transport model1005200000 dynamics and compare simulation behavior across
  conditions.'
