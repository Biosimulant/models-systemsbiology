title: Heldt2012 - Influenza Virus Replication
description: 'Heldt2012 - Influenza Virus Replication The model describes the life
  cycle of influenza A virus in a mammalian cell including the following steps: attachment
  of parental virions to the cell membrane,. It can be used to explore systemsbiology
  heldt2012 influenza virus replication BioModels0000000463 dynamics and compare simulation
  behavior across conditions.'
