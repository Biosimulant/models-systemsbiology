schema_version: '2.0'
title: Bhalla2001 Mapk Mkp1 Oscillation Lab
description: This model relates to figure 5 in &lt;a href = 'http://www.ncbi.nlm.nih.gov/entrez/query.fcgi?cmd=Retrieve&amp;db=pubmed&amp;dopt=Abstract&amp;list_uids=12779455'&gt;Bhalla
  US, Iyengar R. It can be used to explore systemsbiology bhalla2001 mapk mkp1 oscillation
  model9071773985 dynamics and compare simulation behavior across conditions.
models:
- alias: systemsbiology_sbml_bhalla2001_mapk_mkp1_oscillation_model9071773985_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: systemsbiology_sbml_bhalla2001_mapk_mkp1_oscillation_model9071773985_model.state
  to:
  - visualisation.systemsbiology_sbml_bhalla2001_mapk_mkp1_oscillation_model9071773985_model_state
- from: systemsbiology_sbml_bhalla2001_mapk_mkp1_oscillation_model9071773985_model.summary
  to:
  - visualisation.systemsbiology_sbml_bhalla2001_mapk_mkp1_oscillation_model9071773985_model_summary
- from: systemsbiology_sbml_bhalla2001_mapk_mkp1_oscillation_model9071773985_model.species_labels
  to:
  - visualisation.systemsbiology_sbml_bhalla2001_mapk_mkp1_oscillation_model9071773985_model_species_labels
runtime:
  duration: 1.0
  communication_step: 0.1
  initial_inputs: {}
tags:
- signaling
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
io:
  inputs:
  - name: initial_mapk_slash_mkp_minus_1_minus_gene
    maps_to: systemsbiology_sbml_bhalla2001_mapk_mkp1_oscillation_model9071773985_model.initial_mapk_slash_mkp_minus_1_minus_gene
    label: Initial MAPK Slash Mkp Minus 1 Minus Gene
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `MAPK_slash_MKP_minus_1_minus_gene`.
  - name: initial_pla2_slash_apc
    maps_to: systemsbiology_sbml_bhalla2001_mapk_mkp1_oscillation_model9071773985_model.initial_pla2_slash_apc
    label: Initial Pla2 Slash Apc
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `PLA2_slash_APC`.
  - name: initial_model_state_dag
    maps_to: systemsbiology_sbml_bhalla2001_mapk_mkp1_oscillation_model9071773985_model.initial_model_state_dag
    label: Initial Model State Dag
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `DAG`.
  - name: initial_model_state_aa
    maps_to: systemsbiology_sbml_bhalla2001_mapk_mkp1_oscillation_model9071773985_model.initial_model_state_aa
    label: Initial Model State Aa
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `AA`.
  - name: initial_temp_minus_pip2
    maps_to: systemsbiology_sbml_bhalla2001_mapk_mkp1_oscillation_model9071773985_model.initial_temp_minus_pip2
    label: Initial Temp Minus Pip2
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `temp_minus_PIP2`.
  - name: initial_mapk_slash_mapk
    maps_to: systemsbiology_sbml_bhalla2001_mapk_mkp1_oscillation_model9071773985_model.initial_mapk_slash_mapk
    label: Initial MAPK Slash MAPK
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `MAPK_slash_MAPK`.
  outputs:
  - name: state
    maps_to: systemsbiology_sbml_bhalla2001_mapk_mkp1_oscillation_model9071773985_model.state
  - name: summary
    maps_to: systemsbiology_sbml_bhalla2001_mapk_mkp1_oscillation_model9071773985_model.summary
  - name: species_labels
    maps_to: systemsbiology_sbml_bhalla2001_mapk_mkp1_oscillation_model9071773985_model.species_labels
  - name: mapk_slash_mkp_minus_1_minus_gene
    maps_to: systemsbiology_sbml_bhalla2001_mapk_mkp1_oscillation_model9071773985_model.mapk_slash_mkp_minus_1_minus_gene
  - name: pla2_slash_apc
    maps_to: systemsbiology_sbml_bhalla2001_mapk_mkp1_oscillation_model9071773985_model.pla2_slash_apc
  - name: dag
    maps_to: systemsbiology_sbml_bhalla2001_mapk_mkp1_oscillation_model9071773985_model.dag
  - name: model_state_aa
    maps_to: systemsbiology_sbml_bhalla2001_mapk_mkp1_oscillation_model9071773985_model.model_state_aa
  - name: temp_minus_pip2
    maps_to: systemsbiology_sbml_bhalla2001_mapk_mkp1_oscillation_model9071773985_model.temp_minus_pip2
  - name: mapk_slash_mapk
