schema_version: '2.0'
title: LeBeau1999 - IP3-dependent intracellular calcium oscillations due to agonist
  stimulation from Cholecytokinin
description: The properties of inositol 1,4,5-trisphosphate (IP3)-dependent intracellular
  calcium oscillations in pancreatic acinar cells depend crucially on the agonist
  used to stimulate them. It can be used to explore systemsbiology lebeau1999 ip3
  dependent intracellular calcium dynamics and compare simulation behavior across
  conditions.
