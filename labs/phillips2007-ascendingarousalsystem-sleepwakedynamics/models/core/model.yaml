io:
  inputs:
  - name: initial_somnogen_level_h
    maps_to: Somnogen_level_H
    label: Initial Somnogen Level H
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Somnogen_level_H`.
  - name: initial_ventrolateral_preopticarea_vlpo_voltage
    maps_to: Ventrolateral_preopticarea__VLPO__voltage
    label: Initial Ventrolateral Preopticarea Vlpo Voltage
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Ventrolateral_preopticarea__VLPO__voltage`.
  - name: initial_monoaminergic_ma_voltage
    maps_to: Monoaminergic__MA__voltage
    label: Initial Monoaminergic Ma Voltage
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Monoaminergic__MA__voltage`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: somnogen_level_h
    maps_to: Somnogen_level_H
    label: Somnogen level H
    description: Somnogen level H. Maps to SBML symbol `Somnogen_level_H`.
  - name: ventrolateral_preopticarea_vlpo_voltage
    maps_to: Ventrolateral_preopticarea__VLPO__voltage
    label: Ventrolateral preopticarea (VLPO) voltage
    description: Ventrolateral preopticarea (VLPO) voltage. Maps to SBML symbol `Ventrolateral_preopticarea__VLPO__voltage`.
  - name: monoaminergic_ma_voltage
    maps_to: Monoaminergic__MA__voltage
    label: Monoaminergic (MA) voltage
    description: Monoaminergic (MA) voltage. Maps to SBML symbol `Monoaminergic__MA__voltage`.
