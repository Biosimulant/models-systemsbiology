  - visualisation.systemsbiology_sbml_band2012_dii_venus_reducedmodel_biomd0000000414_model_summary
- from: systemsbiology_sbml_band2012_dii_venus_reducedmodel_biomd0000000414_model.species_labels
  to:
  - visualisation.systemsbiology_sbml_band2012_dii_venus_reducedmodel_biomd0000000414_model_species_labels
runtime:
  duration: 1.0
  communication_step: 0.1
  initial_inputs: {}
tags:
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
io:
  inputs:
  - name: initial_venus
    maps_to: systemsbiology_sbml_band2012_dii_venus_reducedmodel_biomd0000000414_model.initial_venus
