      `VENUS`.
  outputs:
  - name: state
    maps_to: systemsbiology_sbml_band2012_dii_venus_reducedmodel_biomd0000000414_model.state
  - name: summary
    maps_to: systemsbiology_sbml_band2012_dii_venus_reducedmodel_biomd0000000414_model.summary
  - name: species_labels
    maps_to: systemsbiology_sbml_band2012_dii_venus_reducedmodel_biomd0000000414_model.species_labels
  - name: venus
    maps_to: systemsbiology_sbml_band2012_dii_venus_reducedmodel_biomd0000000414_model.venus
