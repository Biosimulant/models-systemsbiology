schema_version: '2.0'
title: Band2012 Dii Venus Reducedmodel Lab
description: 'This model is from the article: Root gravitropism is regulated by a
  transient lateral auxin gradient controlled by a tipping-point mechanism. Band LR,
  Wells DM, Larrieu A, Sun J, Middleton AM, French.'
models:
- alias: systemsbiology_sbml_band2012_dii_venus_reducedmodel_biomd0000000414_model
