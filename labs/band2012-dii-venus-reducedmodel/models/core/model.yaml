  license: CC0
biosim:
  entrypoint: src.band2012_dii_venus_reducedmodel_biomd0000000414_model:Band2012DiiVenusReducedmodelBiomd0000000414Model
  init_kwargs:
    model_path: data/BIOMD0000000414.xml
