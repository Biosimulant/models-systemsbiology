  - visualisation.systemsbiology_sbml_shibeko2012_model_of_iia_generation_model1808150001_model_species_labels
runtime:
  duration: 1.0
  communication_step: 0.1
  initial_inputs: {}
tags:
- generegulation
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
