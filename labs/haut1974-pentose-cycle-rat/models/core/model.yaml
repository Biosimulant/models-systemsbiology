  - name: initial_glucose_hexokinase
    maps_to: glucose_hexokinase
    label: Initial Glucose Hexokinase
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `glucose_hexokinase`.
  - name: initial_glucose_inside_cell
    maps_to: glucose_inside_cell
    label: Initial Glucose Inside Cell
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
