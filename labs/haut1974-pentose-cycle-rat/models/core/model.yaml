    description: glucose 6-phosphate. Maps to SBML symbol `glucose_6_phosphate`.
  - name: nadp
    maps_to: NADP
    label: NADP+
    description: NADP+. Maps to SBML symbol `NADP`.
  - name: glucose_hexokinase
    maps_to: glucose_hexokinase
    label: glucose-hexokinase
