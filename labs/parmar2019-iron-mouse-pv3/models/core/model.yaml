  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: fe_rbc
    maps_to: FeRBC
    label: FeRBC
    description: FeRBC. Maps to SBML symbol `FeRBC`.
  - name: fe_duo
    maps_to: FeDuo
    label: FeDuo
    description: FeDuo. Maps to SBML symbol `FeDuo`.
  - name: fe_spleen
    maps_to: FeSpleen
    label: FeSpleen
    description: FeSpleen. Maps to SBML symbol `FeSpleen`.
  - name: fe_bm
    maps_to: FeBM
    label: FeBM
    description: FeBM. Maps to SBML symbol `FeBM`.
  - name: fe_liver
