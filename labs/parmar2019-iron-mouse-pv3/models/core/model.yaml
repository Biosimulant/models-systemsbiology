  - name: initial_fe_duo
    maps_to: FeDuo
    label: Initial Fe Duo
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `FeDuo`.
  - name: initial_fe_spleen
    maps_to: FeSpleen
    label: Initial Fe Spleen
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `FeSpleen`.
  - name: initial_fe_bm
    maps_to: FeBM
    label: Initial Fe Bm
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `FeBM`.
  - name: initial_fe_liver
    maps_to: FeLiver
    label: Initial Fe Liver
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
