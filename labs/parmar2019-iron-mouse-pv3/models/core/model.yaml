schema_version: '2.0'
title: Parmar2019 - Iron Mouse PV3
description: Iron Mouse PV3 'A computational model to understand mouse iron physiology
  and diseases' By Jignesh Parmar and Pedro Mendes Base model This is a dynamic model
  of iron distribution in mice, covering sev. It can be used to explore systemsbiology
  parmar2019 iron mouse pv3 model1805140003 dynamics and compare simulation behavior
  across conditions.
standard: other
tags:
- physiology
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Jignesh H Parmar
- Pedro Mendes
upstream:
  id: biomodels_ebi:MODEL1805140003
  source_db: biomodels_ebi
  source_id: MODEL1805140003
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/MODEL1805140003
  download_url: https://www.ebi.ac.uk/biomodels/model/download/MODEL1805140003?filename=IronMousePV3.xml
  license: CC0
biosim:
  entrypoint: src.parmar2019_iron_mouse_pv3_model1805140003_model:Parmar2019IronMousePv3Model1805140003Model
  init_kwargs:
    model_path: data/MODEL1805140003.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
