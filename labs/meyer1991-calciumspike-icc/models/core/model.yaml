  source_db: biomodels_ebi
  source_id: BIOMD0000000224
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000224
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000224?filename=BIOMD0000000224_url.xml
