io:
  inputs:
  - name: initial_ca_s
    maps_to: CaS
    label: Initial Ca S
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `CaS`.
  - name: initial_ca_i
    maps_to: CaI
    label: Initial Ca I
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `CaI`.
  - name: initial_model_state_ip3
    maps_to: IP3
    label: Initial Model State IP3
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `IP3`.
  - name: initial_model_state_g
    maps_to: g
    label: Initial Model State G
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `g`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: ca_s
    maps_to: CaS
    label: CaS
    description: CaS. Maps to SBML symbol `CaS`.
  - name: ca_i
    maps_to: CaI
    label: CaI
    description: CaI. Maps to SBML symbol `CaI`.
  - name: ip3
    maps_to: IP3
    label: IP3
    description: IP3. Maps to SBML symbol `IP3`.
  - name: model_state_g
    maps_to: g
    label: G
    description: G. Maps to SBML symbol `g`.
