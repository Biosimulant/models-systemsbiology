schema_version: '2.0'
title: Lo2005 Stochastic Modeling Of Blood Coagulation Initiation Lab
description: Simulation results using a stochastic approach to Hockin et al. (2002)
  mathematical model of the blood coagulation cascade that had been previously simulated
  using a deterministic method.
models:
