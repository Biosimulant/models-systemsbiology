io:
  inputs:
  - name: initial_co_activator
    maps_to: CA
    label: Initial Co Activator
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `CA`.
  - name: initial_ligand_receptor_co_activator
    maps_to: LRCA
    label: Initial Ligand Receptor Co Activator
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `LRCA`.
  - name: initial_ligand_receptor
    maps_to: LR
    label: Initial Ligand Receptor
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `LR`.
  - name: initial_receptor
    maps_to: R
    label: Initial Receptor
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `R`.
  - name: initial_ligand
    maps_to: L
    label: Initial Ligand
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `L`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: co_activator
    maps_to: CA
    label: CoActivator
    description: CoActivator. Maps to SBML symbol `CA`.
  - name: ligand_receptor_co_activator
    maps_to: LRCA
    label: Ligand-Receptor-CoActivator
    description: Ligand-Receptor-CoActivator. Maps to SBML symbol `LRCA`.
  - name: ligand_receptor
    maps_to: LR
    label: Ligand-Receptor
    description: Ligand-Receptor. Maps to SBML symbol `LR`.
  - name: receptor
    maps_to: R
    label: Receptor
    description: Receptor. Maps to SBML symbol `R`.
  - name: ligand
    maps_to: L
    label: Ligand
    description: Ligand. Maps to SBML symbol `L`.
