schema_version: '2.0'
title: Liu2011 Complement System Lab
description: 'Model of the Complement System This is the continuous deterministic
  (ODE) model of the complement system described in the article: Computational and
  Experimental Study of the Regulatory Mechanisms of. It can be used to explore systemsbiology
  liu2011 complement system BioModels0000000303 dynamics and compare simulation behavior
  across conditions.'
models:
- alias: systemsbiology_sbml_liu2011_complement_system_biomd0000000303_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: systemsbiology_sbml_liu2011_complement_system_biomd0000000303_model.state
  to:
  - visualisation.systemsbiology_sbml_liu2011_complement_system_biomd0000000303_model_state
- from: systemsbiology_sbml_liu2011_complement_system_biomd0000000303_model.summary
  to:
  - visualisation.systemsbiology_sbml_liu2011_complement_system_biomd0000000303_model_summary
- from: systemsbiology_sbml_liu2011_complement_system_biomd0000000303_model.species_labels
  to:
  - visualisation.systemsbiology_sbml_liu2011_complement_system_biomd0000000303_model_species_labels
runtime:
  duration: 1.0
  communication_step: 0.1
  initial_inputs: {}
tags:
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
