schema_version: '2.0'
title: Ibrahim2008 Cdc20 Sequestring Template Lab
description: Biophysical Chemistry 134 (2008) 93-100 Mad2 binding is not sufficient
  for complete Cdc20 sequestering in mitotic transition control (an in silico study)
  Bashar Ibrahim, Peter Dittrich, Stephan Diekma. It can be used to explore systemsbiology
  ibrahim2008 cdc20 sequestring template BioModels0000000194 dynamics and compare
  simulation behavior across conditions.
models:
- alias: systemsbiology_sbml_ibrahim2008_cdc20_sequestring_template_model_biomd0000000194_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: systemsbiology_sbml_ibrahim2008_cdc20_sequestring_template_model_biomd0000000194_model.state
  to:
  - visualisation.systemsbiology_sbml_ibrahim2008_cdc20_sequestring_template_model_biomd0000000194_model_state
- from: systemsbiology_sbml_ibrahim2008_cdc20_sequestring_template_model_biomd0000000194_model.summary
  to:
  - visualisation.systemsbiology_sbml_ibrahim2008_cdc20_sequestring_template_model_biomd0000000194_model_summary
- from: systemsbiology_sbml_ibrahim2008_cdc20_sequestring_template_model_biomd0000000194_model.species_labels
  to:
  - visualisation.systemsbiology_sbml_ibrahim2008_cdc20_sequestring_template_model_biomd0000000194_model_species_labels
runtime:
  duration: 1.0
  communication_step: 0.1
  initial_inputs: {}
tags:
- cellcycle
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
io:
  inputs:
  - name: initial_o_mad2
    maps_to: systemsbiology_sbml_ibrahim2008_cdc20_sequestring_template_model_biomd0000000194_model.initial_o_mad2
    label: Initial O Mad2
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `OMad2`.
  - name: initial_mad1_c_mad2
    maps_to: systemsbiology_sbml_ibrahim2008_cdc20_sequestring_template_model_biomd0000000194_model.initial_mad1_c_mad2
    label: Initial Mad1 C Mad2
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Mad1_CMad2`.
  - name: initial_mad1_c_mad2_o_mad2
    maps_to: systemsbiology_sbml_ibrahim2008_cdc20_sequestring_template_model_biomd0000000194_model.initial_mad1_c_mad2_o_mad2
    label: Initial Mad1 C Mad2 O Mad2
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Mad1_CMad2_OMad2`.
  - name: initial_cdc20_c_mad2
    maps_to: systemsbiology_sbml_ibrahim2008_cdc20_sequestring_template_model_biomd0000000194_model.initial_cdc20_c_mad2
    label: Initial Cdc20 C Mad2
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Cdc20_CMad2`.
  - name: initial_cdc20
    maps_to: systemsbiology_sbml_ibrahim2008_cdc20_sequestring_template_model_biomd0000000194_model.initial_cdc20
    label: Initial Cdc20
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Cdc20`.
  outputs:
  - name: state
    maps_to: systemsbiology_sbml_ibrahim2008_cdc20_sequestring_template_model_biomd0000000194_model.state
  - name: summary
    maps_to: systemsbiology_sbml_ibrahim2008_cdc20_sequestring_template_model_biomd0000000194_model.summary
  - name: species_labels
    maps_to: systemsbiology_sbml_ibrahim2008_cdc20_sequestring_template_model_biomd0000000194_model.species_labels
  - name: o_mad2
    maps_to: systemsbiology_sbml_ibrahim2008_cdc20_sequestring_template_model_biomd0000000194_model.o_mad2
  - name: mad1_c_mad2
    maps_to: systemsbiology_sbml_ibrahim2008_cdc20_sequestring_template_model_biomd0000000194_model.mad1_c_mad2
  - name: mad1_c_mad2_o_mad2
    maps_to: systemsbiology_sbml_ibrahim2008_cdc20_sequestring_template_model_biomd0000000194_model.mad1_c_mad2_o_mad2
  - name: cdc20_c_mad2
    maps_to: systemsbiology_sbml_ibrahim2008_cdc20_sequestring_template_model_biomd0000000194_model.cdc20_c_mad2
  - name: cdc20
    maps_to: systemsbiology_sbml_ibrahim2008_cdc20_sequestring_template_model_biomd0000000194_model.cdc20
