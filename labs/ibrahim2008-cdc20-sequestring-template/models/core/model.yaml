schema_version: '2.0'
title: Ibrahim2008_Cdc20_Sequestring_Template_Model
description: Biophysical Chemistry 134 (2008) 93-100 Mad2 binding is not sufficient
  for complete Cdc20 sequestering in mitotic transition control (an in silico study)
  Bashar Ibrahim, Peter Dittrich, Stephan Diekma. It can be used to explore systemsbiology
  ibrahim2008 cdc20 sequestring template BioModels0000000194 dynamics and compare
  simulation behavior across conditions.
standard: other
tags:
- cellcycle
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Bashar Ibrahim
- Peter Dittrich
- Stephan Diekmann
- Eberhard Schmitt
upstream:
  id: biomodels_ebi:BIOMD0000000194
  source_db: biomodels_ebi
  source_id: BIOMD0000000194
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000194
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000194?filename=BIOMD0000000194_url.xml
  license: CC0
biosim:
  entrypoint: src.ibrahim2008_cdc20_sequestring_template_model_biomd0000000194_model:Ibrahim2008Cdc20SequestringTemplateModelBiomd0000000194Model
  init_kwargs:
    model_path: data/BIOMD0000000194.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
io:
  inputs:
  - name: initial_o_mad2
    maps_to: OMad2
    label: Initial O Mad2
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `OMad2`.
  - name: initial_mad1_c_mad2
    maps_to: Mad1_CMad2
    label: Initial Mad1 C Mad2
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Mad1_CMad2`.
  - name: initial_mad1_c_mad2_o_mad2
    maps_to: Mad1_CMad2_OMad2
    label: Initial Mad1 C Mad2 O Mad2
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Mad1_CMad2_OMad2`.
  - name: initial_cdc20_c_mad2
    maps_to: Cdc20_CMad2
    label: Initial Cdc20 C Mad2
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Cdc20_CMad2`.
  - name: initial_cdc20
    maps_to: Cdc20
    label: Initial Cdc20
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Cdc20`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: o_mad2
    maps_to: OMad2
    label: O-Mad2
    description: O-Mad2. Maps to SBML symbol `OMad2`.
  - name: mad1_c_mad2
    maps_to: Mad1_CMad2
    label: Mad1:C-Mad2
    description: Mad1:C-Mad2. Maps to SBML symbol `Mad1_CMad2`.
  - name: mad1_c_mad2_o_mad2
    maps_to: Mad1_CMad2_OMad2
    label: Mad1:C-Mad2:O-Mad2*
    description: Mad1:C-Mad2:O-Mad2*. Maps to SBML symbol `Mad1_CMad2_OMad2`.
  - name: cdc20_c_mad2
    maps_to: Cdc20_CMad2
    label: Cdc20:C-Mad2
    description: Cdc20:C-Mad2. Maps to SBML symbol `Cdc20_CMad2`.
  - name: cdc20
    maps_to: Cdc20
    label: Cdc20
    description: Cdc20. Maps to SBML symbol `Cdc20`.
