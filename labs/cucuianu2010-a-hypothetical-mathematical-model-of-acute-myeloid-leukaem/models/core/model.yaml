io:
  inputs:
  - name: initial_y_leukemic_cell
    maps_to: y_Leukemic_Cell
    label: Initial Y Leukemic Cell
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `y_Leukemic_Cell`.
  - name: initial_x_normal_hematopoietic_stem_cell
    maps_to: x_Normal_Hematopoietic_Stem_Cell
    label: Initial X Normal Hematopoietic Stem Cell
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `x_Normal_Hematopoietic_Stem_Cell`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: y_leukemic_cell
    maps_to: y_Leukemic_Cell
    label: y_Leukemic_Cell
    description: y_Leukemic_Cell. Maps to SBML symbol `y_Leukemic_Cell`.
  - name: x_normal_hematopoietic_stem_cell
    maps_to: x_Normal_Hematopoietic_Stem_Cell
    label: x_Normal_Hematopoietic_Stem_Cell
    description: x_Normal_Hematopoietic_Stem_Cell. Maps to SBML symbol `x_Normal_Hematopoietic_Stem_Cell`.
