schema_version: '2.0'
title: Cucuianu2010 - A hypothetical-mathematical model of acute myeloid leukaemia
  pathogenesis
description: This is a simple mathematical model describing the growth and removal
  of normal and leukemic haematopoietic stem cell populations and the role of these
  cellular processes in generating monoclonal leuk. It can be used to explore systemsbiology
  cucuianu2010 a hypothetical mathematical o dynamics and compare simulation behavior
  across conditions.
standard: other
tags:
- generegulation
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Cucuianu, A.
- Precup, R.
upstream:
  id: biomodels_ebi:BIOMD0000000799
  source_db: biomodels_ebi
  source_id: BIOMD0000000799
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000799
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000799?filename=Cucuianu2010.xml
  license: CC0
biosim:
  entrypoint: src.cucuianu2010_a_hypothetical_mathematical_model_o_biomd0000000799_model:Cucuianu2010AHypotheticalMathematicalModelOBiomd0000000799Model
  init_kwargs:
    model_path: data/BIOMD0000000799.xml
  communication_step: 1.0
runtime:
