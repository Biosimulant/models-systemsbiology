io:
  inputs:
  - name: riva_daily_dose
    maps_to: Riva_daily_dose
    label: Riva Daily Dose
    description: Source parameter exposed because its SBML label indicates a boundary,
      stimulus, dose, ligand, protocol, substrate, or environmental control. Maps
      to SBML symbol `Riva_daily_dose`.
  - name: warfarin_daily_dose
    maps_to: warfarin_daily_dose
    label: Warfarin Daily Dose
    description: Source parameter exposed because its SBML label indicates a boundary,
      stimulus, dose, ligand, protocol, substrate, or environmental control. Maps
      to SBML symbol `warfarin_daily_dose`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: vk_p
    maps_to: VK_p
    label: VK_p
    description: VK_p. Maps to SBML symbol `VK_p`.
  - name: a_riva
    maps_to: A_riva
    label: A_riva
    description: A_riva. Maps to SBML symbol `A_riva`.
  - name: xa_tfpi
    maps_to: Xa_TFPI
    label: Xa_TFPI
    description: Xa_TFPI. Maps to SBML symbol `Xa_TFPI`.
  - name: xa_atiii_heparin
    maps_to: Xa_ATIII_Heparin
    label: Xa_ATIII_Heparin
    description: Xa_ATIII_Heparin. Maps to SBML symbol `Xa_ATIII_Heparin`.
  - name: va_xa
    maps_to: Va_Xa
    label: Va_Xa
    description: Va_Xa. Maps to SBML symbol `Va_Xa`.
  - name: vi_ia_tf_xa_tfpi
    maps_to: VIIa_TF_Xa_TFPI
    label: VIIa_TF_Xa_TFPI
    description: VIIa_TF_Xa_TFPI. Maps to SBML symbol `VIIa_TF_Xa_TFPI`.
