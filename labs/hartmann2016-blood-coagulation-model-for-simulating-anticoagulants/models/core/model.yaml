  source_db: biomodels_ebi
  source_id: MODEL1807180004
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/MODEL1807180004
  download_url: https://www.ebi.ac.uk/biomodels/model/download/MODEL1807180004?filename=Hartmann2016.xml
  license: CC0
biosim:
  entrypoint: src.hartmann2016_blood_coagulation_model_for_simulat_model1807180004_model:Hartmann2016BloodCoagulationModelForSimulatModel1807180004Model
  init_kwargs:
