schema_version: '2.0'
title: Hartmann2016 - Blood coagulation model for simulating anticoagulants
description: Mathematical model of blood coagulation. It can be used to explore systemsbiology
  hartmann2016 blood coagulation for simulat dynamics and compare simulation behavior
  across conditions.
standard: other
tags:
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- S Hartmann
- K Biliouris
- L J Lesko
- U Nowak-Göttl
- M N Trame
upstream:
