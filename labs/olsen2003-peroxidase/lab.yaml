schema_version: '2.0'
title: Olsen2003 Peroxidase Lab
description: 'Notes of the BioModels curators: The current model reproduce the figure
  7, panel B of the paper. Note that there is a typo in the figure.'
models:
- alias: systemsbiology_sbml_olsen2003_peroxidase_biomd0000000046_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: systemsbiology_sbml_olsen2003_peroxidase_biomd0000000046_model.state
  to:
  - visualisation.systemsbiology_sbml_olsen2003_peroxidase_biomd0000000046_model_state
- from: systemsbiology_sbml_olsen2003_peroxidase_biomd0000000046_model.summary
