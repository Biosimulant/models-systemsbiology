    description: NADH. Maps to SBML symbol `NADH`.
  - name: nad2
    maps_to: NAD2
    label: NAD2
    description: NAD2. Maps to SBML symbol `NAD2`.
  - name: nad
    maps_to: NAD
    label: NAD
    description: NAD. Maps to SBML symbol `NAD`.
  - name: ar_h
    maps_to: ArH
    label: ArH
    description: ArH. Maps to SBML symbol `ArH`.
