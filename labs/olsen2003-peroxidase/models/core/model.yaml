  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: na_drad
    maps_to: NADrad
    label: NADrad
    description: NADrad. Maps to SBML symbol `NADrad`.
  - name: nad_hres
    maps_to: NADHres
    label: NADHres
