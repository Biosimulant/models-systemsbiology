schema_version: '2.0'
title: Bouchnita2020 Model For Blood Coagulation Under Venous Flow Condition Lab
description: A numerical simulation model to reproduce in vitro experiments of blood
  coagulation in microfluidic capillaries. A reduced one-equation model of thrombin
  distribution from the previous model under sim.
models:
- alias: systemsbiology_sbml_bouchnita2020_model_for_blood_coagulation_under_model2011030003_model
  path: models/core
- alias: visualisation
  path: models/visualisation
