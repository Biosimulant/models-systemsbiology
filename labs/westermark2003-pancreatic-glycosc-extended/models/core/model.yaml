  of phosphofructokinase and glycolytic oscillations in the pancreatic beta-cell.'
standard: other
tags:
- physiology
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Pål O Westermark
- Anders Lansner
upstream:
  id: biomodels_ebi:BIOMD0000000236
  source_db: biomodels_ebi
  source_id: BIOMD0000000236
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000236
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000236?filename=BIOMD0000000236_url.xml
  license: CC0
biosim:
  entrypoint: src.westermark2003_pancreatic_glycosc_extended_biomd0000000236_model:Westermark2003PancreaticGlycoscExtendedBiomd0000000236Model
  init_kwargs:
    model_path: data/BIOMD0000000236.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
io:
  inputs:
  - name: initial_intracellular_glucose
    maps_to: GLC
    label: Initial Intracellular Glucose
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `GLC`.
  - name: initial_g6_p_f6_p
    maps_to: G6P_F6P
    label: Initial G6 P F6 P
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `G6P_F6P`.
  - name: initial_dhap_g3_p_pool
    maps_to: DHAP_G3P
    label: Initial Dhap G3 P Pool
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `DHAP_G3P`.
  - name: initial_fructose_1_6_biphosphate
    maps_to: FBP
    label: Initial Fructose 1 6 Biphosphate
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `FBP`.
  - name: initial_glyceraldehyde_phosphate
    maps_to: G3P
    label: Initial Glyceraldehyde Phosphate
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `G3P`.
  - name: initial_fructose_6_phosphate
    maps_to: F6P
    label: Initial Fructose 6 Phosphate
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `F6P`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: intracellular_glucose
    maps_to: GLC
    label: intracellular glucose
    description: intracellular glucose. Maps to SBML symbol `GLC`.
  - name: g6_p_f6_p
    maps_to: G6P_F6P
    label: G6P_F6P
    description: G6P_F6P. Maps to SBML symbol `G6P_F6P`.
  - name: dhap_g3_p_pool
    maps_to: DHAP_G3P
    label: DHAP-G3P pool
    description: DHAP-G3P pool. Maps to SBML symbol `DHAP_G3P`.
  - name: fructose_1_6_biphosphate
    maps_to: FBP
    label: fructose-1,6-biphosphate
    description: fructose-1,6-biphosphate. Maps to SBML symbol `FBP`.
  - name: glyceraldehyde_phosphate
    maps_to: G3P
    label: glyceraldehyde--phosphate
    description: glyceraldehyde--phosphate. Maps to SBML symbol `G3P`.
  - name: fructose_6_phosphate
    maps_to: F6P
    label: fructose-6-phosphate
    description: fructose-6-phosphate. Maps to SBML symbol `F6P`.
