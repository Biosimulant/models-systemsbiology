schema_version: '2.0'
title: Leloup2004 - Mammalian Circadian Rhythm models for 23.8 and 24.2 hours timeperiod
description: We extend the study of a computational model recently proposed for the
  mammalian circadian clock (Proc. It can be used to explore systemsbiology leloup2004
  mammalian circadian rhythm for dynamics and compare simulation behavior across conditions.
standard: other
tags:
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Jean-Christophe Leloup
- Albert Goldbeter
