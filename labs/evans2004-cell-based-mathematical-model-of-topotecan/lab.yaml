schema_version: '2.0'
title: Evans2004 Cell Based Mathematical Model Of Topotecan Lab
description: A two compartment mathematical model of the antineoplastic compound topotecan.
  It can be used to explore systemsbiology evans2004 cell based mathematical of dynamics
  and compare simulation behavior across conditions.
