title: Ciliberto2005 Steady States And Oscillations In The P53 Mdm2 Network Lab
description: Its a mathematial model studying steady state and oscialltions in p53-MDM2
  network triggered by IR induced DNA Damage. It can be used to explore systemsbiology
  ciliberto2005 steady states and oscillations dynamics and compare simulation behavior
  across conditions.
