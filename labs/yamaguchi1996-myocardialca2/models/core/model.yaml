    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: tn_ca
    maps_to: TnCa
    label: TnCa
    description: TnCa. Maps to SBML symbol `TnCa`.
  - name: fti
    maps_to: FTI
    label: FTI
    description: FTI. Maps to SBML symbol `FTI`.
  - name: cum_cb_on
