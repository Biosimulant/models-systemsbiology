    label: CumCB On
    description: CumCB On. Maps to SBML symbol `CumCB_on`.
  - name: cum_cb_off
    maps_to: CumCB_off
    label: CumCB Off
    description: CumCB Off. Maps to SBML symbol `CumCB_off`.
  - name: cb_on
    maps_to: CB_on
    label: CB On
    description: CB On. Maps to SBML symbol `CB_on`.
