schema_version: '2.0'
title: Sengupta2015 - Knowledge base model of human energy pool network (HEPNet)
description: 'Sengupta2015 - Knowledge base model of humanenergy pool network (HEPNet)
  This model is described in the article: HEPNet: A Knowledge Base Model of Human
  Energy Pool Network for Predicting the Energy A. It can be used to explore systemsbiology
  sengupta2015 knowledge base of human dynamics and compare simulation behavior across
  conditions.'
standard: other
tags:
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Abhishek Sengupta
- Monendra Grover
- Amlan Chakraborty
- Sarika Saxena
- Sarika Saxena
