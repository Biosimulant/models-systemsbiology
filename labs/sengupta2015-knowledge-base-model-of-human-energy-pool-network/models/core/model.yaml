io:
  inputs:
  - name: initial_udp_glucose4epimerase
    maps_to: s13
    label: Initial Udp Glucose4epimerase
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `s13`.
  - name: initial_glucose
    maps_to: s71
    label: Initial Glucose
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `s71`.
  - name: initial_model_state_2_atp
    maps_to: s29
    label: Initial Model State 2 ATP
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `s29`.
  - name: initial_model_state_atp
    maps_to: s63
    label: Initial Model State ATP
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `s63`.
  - name: initial_model_state_atp_2
    maps_to: s345
    label: Initial Model State ATP 2
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `s345`.
  - name: initial_model_state_2_adp
    maps_to: s30
    label: Initial Model State 2 ADP
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `s30`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: udp_glucose4epimerase
    maps_to: s13
    label: UDP glucose4epimerase
    description: UDP glucose4epimerase. Maps to SBML symbol `s13`.
  - name: glucose
    maps_to: s71
    label: Glucose
    description: Glucose. Maps to SBML symbol `s71`.
  - name: model_state_2_atp
    maps_to: s29
    label: 2ATP
    description: 2ATP. Maps to SBML symbol `s29`.
  - name: atp
    maps_to: s63
    label: ATP
    description: ATP. Maps to SBML symbol `s63`.
  - name: atp_2
    maps_to: s345
    label: ATP
    description: ATP. Maps to SBML symbol `s345`.
  - name: model_state_2_adp
    maps_to: s30
    label: 2ADP
    description: 2ADP. Maps to SBML symbol `s30`.
