    description: LacI protein. Maps to SBML symbol `PX`.
  - name: tet_r_mrna
    maps_to: Y
    label: TetR mRNA
    description: TetR mRNA. Maps to SBML symbol `Y`.
  - name: c_i_mrna
    maps_to: Z
    label: cI mRNA
    description: cI mRNA. Maps to SBML symbol `Z`.
