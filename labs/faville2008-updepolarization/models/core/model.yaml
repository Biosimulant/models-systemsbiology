    label: Initial Model State Vm
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Vm`.
  - name: initial_phi3
    maps_to: phi3
    label: Initial Phi3
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `phi3`.
  - name: initial_model_state_ns1
    maps_to: NS1
    label: Initial Model State NS1
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `NS1`.
  - name: initial_model_state_cs2
    maps_to: CS2
    label: Initial Model State CS2
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `CS2`.
  - name: initial_model_state_cs1
    maps_to: CS1
    label: Initial Model State CS1
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `CS1`.
  - name: initial_model_state_cmt
    maps_to: CMT
    label: Initial Model State Cmt
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `CMT`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: model_state_vm
    maps_to: Vm
    label: Vm
    description: Vm. Maps to SBML symbol `Vm`.
  - name: phi3
    maps_to: phi3
    label: Phi3
    description: Phi3. Maps to SBML symbol `phi3`.
  - name: ns1
    maps_to: NS1
    label: NS1
    description: NS1. Maps to SBML symbol `NS1`.
  - name: cs2
    maps_to: CS2
    label: CS2
    description: CS2. Maps to SBML symbol `CS2`.
  - name: cs1
    maps_to: CS1
    label: CS1
    description: CS1. Maps to SBML symbol `CS1`.
  - name: cmt
    maps_to: CMT
    label: CMT
    description: CMT. Maps to SBML symbol `CMT`.
