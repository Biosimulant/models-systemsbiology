    label: RanBP1
    description: RanBP1. Maps to SBML symbol `RanBP1`.
  - name: gdp
    maps_to: GDP
    label: GDP
    description: GDP. Maps to SBML symbol `GDP`.
  - name: ran_gap
    maps_to: RanGAP
    label: RanGAP
    description: RanGAP. Maps to SBML symbol `RanGAP`.
  - name: rcc1
