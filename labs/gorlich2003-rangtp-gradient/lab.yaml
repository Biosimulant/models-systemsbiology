schema_version: '2.0'
title: Gorlich2003 Rangtp Gradient Lab
description: This model represents a concentration gradient of RanGTP across the nuclear
  envelope. This gradient is generated by distribution of regulators of RanGTPase.
models:
- alias: systemsbiology_sbml_g_rlich2003_rangtp_gradient_biomd0000000192_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: systemsbiology_sbml_g_rlich2003_rangtp_gradient_biomd0000000192_model.state
  to:
  - visualisation.systemsbiology_sbml_g_rlich2003_rangtp_gradient_biomd0000000192_model_state
- from: systemsbiology_sbml_g_rlich2003_rangtp_gradient_biomd0000000192_model.summary
  to:
  - visualisation.systemsbiology_sbml_g_rlich2003_rangtp_gradient_biomd0000000192_model_summary
- from: systemsbiology_sbml_g_rlich2003_rangtp_gradient_biomd0000000192_model.species_labels
  to:
  - visualisation.systemsbiology_sbml_g_rlich2003_rangtp_gradient_biomd0000000192_model_species_labels
runtime:
  duration: 1.0
  communication_step: 0.1
  initial_inputs: {}
tags:
- generegulation
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
