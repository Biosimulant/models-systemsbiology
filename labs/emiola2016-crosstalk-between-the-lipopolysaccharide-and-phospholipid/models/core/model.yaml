schema_version: '2.0'
title: Emiola2016 - Crosstalk between the lipopolysaccharide and phospholipid pathways
  during outer membrane biosynthesis,
description: Systems Biology Emiola2016Crosstalk Between The Lipopolysacchar Model1601080000Model
  captures core biological behavior in the context of systemsbiology, sbml, biomodels_ebi
  using a biomodels_ebi-sourced OTHER m. When you run it, you can observe state and
  evaluate how the modeled system changes across runs.
