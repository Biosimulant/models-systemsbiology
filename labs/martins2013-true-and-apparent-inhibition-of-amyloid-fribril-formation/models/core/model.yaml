schema_version: '2.0'
title: Martins2013 - True and apparent inhibition of amyloid fribril formation
description: 'Martins2013 - True and apparent inhibition ofamyloid fribril formation
  This model is described in the article: True and apparent inhibition of amyloid
  fibril formation. It can be used to explore systemsbiology martins2013 true and
  apparent inhibition dynamics and compare simulation behavior across conditions.'
standard: other
tags:
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Pedro M Martins
upstream:
  id: biomodels_ebi:BIOMD0000000561
  source_db: biomodels_ebi
  source_id: BIOMD0000000561
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000561
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000561?filename=BIOMD0000000561_url.xml
  license: CC0
biosim:
  entrypoint: src.martins2013_true_and_apparent_inhibition_of_amyl_biomd0000000561_model:Martins2013TrueAndApparentInhibitionOfAmylBiomd0000000561Model
  init_kwargs:
    model_path: data/BIOMD0000000561.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
io:
  inputs:
  - name: initial_amyloid
    maps_to: Amyloid
    label: Initial Amyloid
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Amyloid`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: amyloid
    maps_to: Amyloid
    label: Amyloid
    description: Amyloid. Maps to SBML symbol `Amyloid`.
