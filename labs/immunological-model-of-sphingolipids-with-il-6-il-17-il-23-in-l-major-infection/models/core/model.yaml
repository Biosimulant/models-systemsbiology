schema_version: '2.0'
title: Immunological Model of sphingolipids with IL-6/IL-17/IL-23 in L. major infection
description: In diseased state, we demonstrated that increase in production of sphingosine-1-phosphate
  and overexpression of IL-6,lL-17 and IL-23 with SATB1 leads to disease progression.
  It can be used to explore systemsbiology immunological of sphingolipids with il
  dynamics and compare simulation behavior across conditions.
