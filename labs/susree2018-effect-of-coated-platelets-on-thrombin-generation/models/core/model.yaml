schema_version: '2.0'
title: Susree2018 - Effect of coated platelets on thrombin generation
description: Mathematical model of blood coagulation that simulates the effect of
  coated platelets on thrombin generation. It can be used to explore systemsbiology
  susree2018 effect of coated platelets dynamics and compare simulation behavior across
  conditions.
