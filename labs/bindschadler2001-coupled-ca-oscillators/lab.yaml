schema_version: '2.0'
title: Bindschadler2001 Coupled Ca Oscillators Lab
description: The model reproduces the same amplitude antiphase calcium oscillations
  of coupled cells depicted in Figure 5B of the publication. This model was successfully
  tested on Jarnac and MathSBML.
models:
- alias: systemsbiology_sbml_bindschadler2001_coupled_ca_oscillators_biomd0000000058_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: systemsbiology_sbml_bindschadler2001_coupled_ca_oscillators_biomd0000000058_model.state
  to:
  - visualisation.systemsbiology_sbml_bindschadler2001_coupled_ca_oscillators_biomd0000000058_model_state
- from: systemsbiology_sbml_bindschadler2001_coupled_ca_oscillators_biomd0000000058_model.summary
  to:
  - visualisation.systemsbiology_sbml_bindschadler2001_coupled_ca_oscillators_biomd0000000058_model_summary
- from: systemsbiology_sbml_bindschadler2001_coupled_ca_oscillators_biomd0000000058_model.species_labels
  to:
  - visualisation.systemsbiology_sbml_bindschadler2001_coupled_ca_oscillators_biomd0000000058_model_species_labels
runtime:
  duration: 1.0
  communication_step: 0.1
  initial_inputs: {}
tags:
- generegulation
- physiology
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
