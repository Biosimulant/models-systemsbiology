schema_version: '2.0'
title: Hayer2005 Simple Ampar Traff Lab
description: This is a highly simplified model of the AMPAR trafficking cycle that
  exhibits bistability. It can be used to explore systemsbiology hayer2005 simple
  ampar traff model2 dynamics and compare simulation behavior across conditions.
