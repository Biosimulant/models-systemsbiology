schema_version: '2.0'
title: Bianchi2015 Model For Lymphangiogenesis In Normal And Diabetic Wounds Lab
description: Arianna Bianchi, Kevin J. It can be used to explore systemsbiology bianchi2015
  for lymphangiogenesis in norma dynamics and compare simulation behavior across conditions.
models:
- alias: systemsbiology_sbml_bianchi2015_model_for_lymphangiogenesis_in_norma_biomd0000000722_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: systemsbiology_sbml_bianchi2015_model_for_lymphangiogenesis_in_norma_biomd0000000722_model.state
  to:
  - visualisation.systemsbiology_sbml_bianchi2015_model_for_lymphangiogenesis_in_norma_biomd0000000722_model_state
- from: systemsbiology_sbml_bianchi2015_model_for_lymphangiogenesis_in_norma_biomd0000000722_model.summary
  to:
  - visualisation.systemsbiology_sbml_bianchi2015_model_for_lymphangiogenesis_in_norma_biomd0000000722_model_summary
- from: systemsbiology_sbml_bianchi2015_model_for_lymphangiogenesis_in_norma_biomd0000000722_model.species_labels
  to:
  - visualisation.systemsbiology_sbml_bianchi2015_model_for_lymphangiogenesis_in_norma_biomd0000000722_model_species_labels
runtime:
  duration: 1.0
  communication_step: 0.1
  initial_inputs: {}
tags:
- generegulation
- physiology
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
