    maps_to: feedbackOn
    label: Feedback On
    description: Source parameter exposed because its SBML label indicates a boundary,
      stimulus, dose, ligand, protocol, substrate, or environmental control. Maps
      to SBML symbol `feedbackOn`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: tfs
    maps_to: TFS
    label: TFS
    description: TFS. Maps to SBML symbol `TFS`.
  - name: model_state_tf
    maps_to: TF
    label: TF
    description: TF. Maps to SBML symbol `TF`.
  - name: phz_ms
    maps_to: PhzMS
    label: PhzMS
    description: PhzMS. Maps to SBML symbol `PhzMS`.
  - name: pyo
    maps_to: PYO
    label: PYO
    description: PYO. Maps to SBML symbol `PYO`.
