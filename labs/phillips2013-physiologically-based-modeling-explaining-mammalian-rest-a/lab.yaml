schema_version: '2.0'
title: Phillips2013 Physiologically Based Modeling Explaining Mammalian Rest A Lab
description: The model provides a framework for understanding rest/activity patterns
  effected by the circadian rhythm and relating them to underlying diverse phenotypes.
  It can be used to explore systemsbiology phillips2013 physiologically based modeling
  expl dynamics and compare simulation behavior across conditions.
models:
- alias: systemsbiology_sbml_phillips2013_physiologically_based_modeling_expl_biomd0000001072_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
