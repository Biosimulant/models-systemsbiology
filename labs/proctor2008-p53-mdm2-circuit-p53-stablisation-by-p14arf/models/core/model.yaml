schema_version: '2.0'
title: Proctor2008 - p53/Mdm2 circuit - p53 stablisation by p14ARF
description: 'Proctor2008 - p53/Mdm2 circuit - p53 stabilisation by p14ARF This model
  is described in the article: Explaining oscillations and variability in the p53-Mdm2
  system. It can be used to explore systemsbiology proctor2008 p53 mdm2 circuit p53
  dynamics and compare simulation behavior across conditions.'
