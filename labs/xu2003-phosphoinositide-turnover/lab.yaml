schema_version: '2.0'
title: Xu2003 Phosphoinositide Turnover Lab
description: Xu2003 - Phosphoinositide turnover The model reproduces the percentage
  change of PIP_PM, PIP2_PM and IP3_Cyt as depicted in Figure 1 of the paper. The
  model also contains the equations for the analysi.
models:
- alias: systemsbiology_sbml_xu2003_phosphoinositide_turnover_biomd0000000075_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: systemsbiology_sbml_xu2003_phosphoinositide_turnover_biomd0000000075_model.state
  to:
  - visualisation.systemsbiology_sbml_xu2003_phosphoinositide_turnover_biomd0000000075_model_state
- from: systemsbiology_sbml_xu2003_phosphoinositide_turnover_biomd0000000075_model.summary
  to:
  - visualisation.systemsbiology_sbml_xu2003_phosphoinositide_turnover_biomd0000000075_model_summary
- from: systemsbiology_sbml_xu2003_phosphoinositide_turnover_biomd0000000075_model.species_labels
  to:
  - visualisation.systemsbiology_sbml_xu2003_phosphoinositide_turnover_biomd0000000075_model_species_labels
runtime:
  duration: 1.0
  communication_step: 0.1
  initial_inputs: {}
tags:
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
io:
  inputs:
  - name: initial_pi_pm
    maps_to: systemsbiology_sbml_xu2003_phosphoinositide_turnover_biomd0000000075_model.initial_pi_pm
    label: Initial Pi Pm
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `PI_PM`.
  - name: initial_pip2_pm
    maps_to: systemsbiology_sbml_xu2003_phosphoinositide_turnover_biomd0000000075_model.initial_pip2_pm
    label: Initial Pip2 Pm
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `PIP2_PM`.
  - name: initial_pip_pm
    maps_to: systemsbiology_sbml_xu2003_phosphoinositide_turnover_biomd0000000075_model.initial_pip_pm
    label: Initial Pip Pm
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `PIP_PM`.
  - name: initial_dag_pm
    maps_to: systemsbiology_sbml_xu2003_phosphoinositide_turnover_biomd0000000075_model.initial_dag_pm
    label: Initial Dag Pm
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `DAG_PM`.
  - name: initial_plc_pm
    maps_to: systemsbiology_sbml_xu2003_phosphoinositide_turnover_biomd0000000075_model.initial_plc_pm
    label: Initial Plc Pm
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `PLC_PM`.
  - name: initial_ip3_cyt
    maps_to: systemsbiology_sbml_xu2003_phosphoinositide_turnover_biomd0000000075_model.initial_ip3_cyt
    label: Initial IP3 Cyt
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `IP3_Cyt`.
  outputs:
  - name: state
    maps_to: systemsbiology_sbml_xu2003_phosphoinositide_turnover_biomd0000000075_model.state
  - name: summary
    maps_to: systemsbiology_sbml_xu2003_phosphoinositide_turnover_biomd0000000075_model.summary
  - name: species_labels
    maps_to: systemsbiology_sbml_xu2003_phosphoinositide_turnover_biomd0000000075_model.species_labels
  - name: pi_pm
    maps_to: systemsbiology_sbml_xu2003_phosphoinositide_turnover_biomd0000000075_model.pi_pm
  - name: pip2_pm
    maps_to: systemsbiology_sbml_xu2003_phosphoinositide_turnover_biomd0000000075_model.pip2_pm
  - name: pip_pm
    maps_to: systemsbiology_sbml_xu2003_phosphoinositide_turnover_biomd0000000075_model.pip_pm
  - name: dag_pm
    maps_to: systemsbiology_sbml_xu2003_phosphoinositide_turnover_biomd0000000075_model.dag_pm
  - name: plc_pm
    maps_to: systemsbiology_sbml_xu2003_phosphoinositide_turnover_biomd0000000075_model.plc_pm
  - name: ip3_cyt
    maps_to: systemsbiology_sbml_xu2003_phosphoinositide_turnover_biomd0000000075_model.ip3_cyt
