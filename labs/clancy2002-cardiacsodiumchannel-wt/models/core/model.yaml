  Both Brugada and Long-QT Syndrome Phenotypes: A Simulation Study of Mechanism Original
  model comes from ModelDB with accession numb. It can be used to explore systemsbiology
  clancy2002 cardiacsodiumchannel wt BioModels0000000126 dynamics and compare simulation
  behavior across conditions.'
