schema_version: '2.0'
title: Reynolds2006 - Reduced model of the acute inflammatory response
description: Angela Reynolds, Jonathan Rubin, Gilles Clermont, Judy Day, Yoram Vodovotz
  & G. It can be used to explore systemsbiology reynolds2006 reduced of the acute
  dynamics and compare simulation behavior across conditions.
standard: other
tags:
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Angela Reynolds
- Jonathan Rubin
- Gilles Clermont
- Judy Day
- Yoram Vodovotz
upstream:
  id: biomodels_ebi:BIOMD0000000714
  source_db: biomodels_ebi
  source_id: BIOMD0000000714
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000714
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000714?filename=HealthyOutcome.xml
  license: CC0
biosim:
  entrypoint: src.reynolds2006_reduced_model_of_the_acute_inflamma_biomd0000000714_model:Reynolds2006ReducedModelOfTheAcuteInflammaBiomd0000000714Model
  init_kwargs:
    model_path: data/BIOMD0000000714.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
io:
  inputs:
  - name: initial_anti_inflammatory_mediators_c_a
    maps_to: C_A
    label: Initial Anti Inflammatory Mediators C A
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `C_A`.
  - name: initial_activated_phagocytes_nstar
    maps_to: Nstar
    label: Initial Activated Phagocytes Nstar
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Nstar`.
  - name: initial_pathogen_p
    maps_to: P
    label: Initial Pathogen P
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `P`.
  - name: initial_tissue_damage_d
    maps_to: D
    label: Initial Tissue Damage D
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `D`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: anti_inflammatory_mediators_c_a
    maps_to: C_A
    label: Anti-inflammatory mediators (C_A)
    description: Anti-inflammatory mediators (C_A). Maps to SBML symbol `C_A`.
  - name: activated_phagocytes_nstar
    maps_to: Nstar
    label: Activated Phagocytes (Nstar)
    description: Activated Phagocytes (Nstar). Maps to SBML symbol `Nstar`.
  - name: pathogen_p
    maps_to: P
    label: Pathogen (P)
    description: Pathogen (P). Maps to SBML symbol `P`.
  - name: tissue_damage_d
    maps_to: D
    label: Tissue Damage (D)
    description: Tissue Damage (D). Maps to SBML symbol `D`.
