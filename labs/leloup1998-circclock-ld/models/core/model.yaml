io:
  inputs:
  - name: light_dark_period
    maps_to: l_d
    label: Light Dark Period
    description: Source parameter exposed because its SBML label indicates a boundary,
      stimulus, dose, ligand, protocol, substrate, or environmental control. Maps
      to SBML symbol `l_d`.
  - name: v_d_t_fold_incr_during_light
    maps_to: v_dT_fac
    label: V D T Fold Incr During Light
    description: Source parameter exposed because its SBML label indicates a boundary,
      stimulus, dose, ligand, protocol, substrate, or environmental control. Maps
      to SBML symbol `v_dT_fac`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: tim_mrna
    maps_to: M_T
    label: tim mRNA
    description: tim mRNA. Maps to SBML symbol `M_T`.
  - name: per_mrna
    maps_to: M_P
    label: per mRNA
    description: per mRNA. Maps to SBML symbol `M_P`.
  - name: tim_pp
    maps_to: T2
    label: TIM-pp
    description: TIM-pp. Maps to SBML symbol `T2`.
  - name: per_tim_complex_nuclear
    maps_to: CN
    label: PER_TIM complex nuclear
    description: PER_TIM complex nuclear. Maps to SBML symbol `CN`.
  - name: tim_p
    maps_to: T1
    label: TIM-p
    description: TIM-p. Maps to SBML symbol `T1`.
  - name: tim
    maps_to: T0
    label: TIM
    description: TIM. Maps to SBML symbol `T0`.
