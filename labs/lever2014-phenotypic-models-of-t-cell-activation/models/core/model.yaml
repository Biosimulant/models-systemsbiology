schema_version: '2.0'
title: Lever2014 - Phenotypic models of T cell activation.
description: This is a phenotypic model of a kinetic proofreading mechanism used to
  describe dynamics governing interactions between T cell receptors and peptide-MHC
  complexes. It can be used to explore systemsbiology lever2014 phenotypic of t cell
  dynamics and compare simulation behavior across conditions.
