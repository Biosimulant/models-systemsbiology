      `Normal_Th_cells`.
  - name: initial_pathogen_virus
    maps_to: Pathogen_Virus
    label: Initial Pathogen Virus
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Pathogen_Virus`.
  - name: initial_single_infected_th_cells
    maps_to: Single_Infected_Th_Cells
    label: Initial Single Infected Th Cells
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Single_Infected_Th_Cells`.
  - name: initial_recombinant_virus
    maps_to: Recombinant_Virus
    label: Initial Recombinant Virus
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Recombinant_Virus`.
  - name: initial_double_infected_th_cells
    maps_to: Double_Infected_Th_Cells
    label: Initial Double Infected Th Cells
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Double_Infected_Th_Cells`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: normal_th_cells
    maps_to: Normal_Th_cells
    label: Normal Th cells
    description: Normal Th cells. Maps to SBML symbol `Normal_Th_cells`.
  - name: pathogen_virus
    maps_to: Pathogen_Virus
    label: Pathogen Virus
    description: Pathogen Virus. Maps to SBML symbol `Pathogen_Virus`.
  - name: single_infected_th_cells
    maps_to: Single_Infected_Th_Cells
    label: Single Infected Th Cells
    description: Single Infected Th Cells. Maps to SBML symbol `Single_Infected_Th_Cells`.
  - name: recombinant_virus
    maps_to: Recombinant_Virus
    label: Recombinant Virus
    description: Recombinant Virus. Maps to SBML symbol `Recombinant_Virus`.
  - name: double_infected_th_cells
    maps_to: Double_Infected_Th_Cells
    label: Double Infected Th Cells
    description: Double Infected Th Cells. Maps to SBML symbol `Double_Infected_Th_Cells`.
