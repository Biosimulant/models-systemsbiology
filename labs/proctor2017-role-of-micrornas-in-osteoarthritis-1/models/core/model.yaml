      `miR`.
  - name: initial_tf1target_mrna
    maps_to: TF1target_mRNA
    label: Initial Tf1target MRNA
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `TF1target_mRNA`.
  - name: initial_model_state_tf1
    maps_to: TF1
    label: Initial Model State TF1
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `TF1`.
  - name: initial_sink
    maps_to: Sink
    label: Initial Sink
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Sink`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: mi_r
    maps_to: miR
    label: miR
    description: miR. Maps to SBML symbol `miR`.
  - name: tf1target_mrna
    maps_to: TF1target_mRNA
    label: TF1target_mRNA
    description: TF1target_mRNA. Maps to SBML symbol `TF1target_mRNA`.
  - name: tf1
    maps_to: TF1
    label: TF1
    description: TF1. Maps to SBML symbol `TF1`.
  - name: sink
    maps_to: Sink
    label: Sink
    description: Sink. Maps to SBML symbol `Sink`.
