schema_version: '2.0'
title: Baugh1998 - Regulation of coagulation factor Xa by TFPI
description: Basic mathematical model of the formation of coagulation factor Xa involving
  TF:VIIa and its inhibition by TFPI. It can be used to explore systemsbiology baugh1998
  regulation of coagulation factor dynamics and compare simulation behavior across
  conditions.
standard: other
tags:
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
