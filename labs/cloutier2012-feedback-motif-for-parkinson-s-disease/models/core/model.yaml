    - tellurium==2.2.11.2
io:
  inputs:
  - name: initial_alpha_syn
    maps_to: alpha_syn
    label: Initial Alpha Syn
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `alpha_syn`.
  - name: initial_model_state_ros
    maps_to: ROS
    label: Initial Model State Ros
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `ROS`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: alpha_syn
    maps_to: alpha_syn
    label: alpha-syn
    description: alpha-syn. Maps to SBML symbol `alpha_syn`.
  - name: ros
    maps_to: ROS
    label: ROS
    description: ROS. Maps to SBML symbol `ROS`.
