schema_version: '2.0'
title: Cloutier2012 - Feedback motif for Parkinson's disease
description: 'Cloutier2012 - Feedback motif for Parkinson''sdisease This model is
  described in the article: Feedback motif for the pathogenesis of Parkinson''s disease.
  It can be used to explore systemsbiology cloutier2012 feedback motif for parkinson
  dynamics and compare simulation behavior across conditions.'
standard: other
tags:
- generegulation
- neuroscience
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- M Cloutier
- R Middleton
- P Wellstead
upstream:
  id: biomodels_ebi:BIOMD0000000558
  source_db: biomodels_ebi
  source_id: BIOMD0000000558
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000558
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000558?filename=BIOMD0000000558_url.xml
  license: CC0
biosim:
  entrypoint: src.cloutier2012_feedback_motif_for_parkinson_s_dise_biomd0000000558_model:Cloutier2012FeedbackMotifForParkinsonSDiseBiomd0000000558Model
  init_kwargs:
    model_path: data/BIOMD0000000558.xml
