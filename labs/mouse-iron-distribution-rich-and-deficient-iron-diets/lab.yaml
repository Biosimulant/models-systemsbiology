schema_version: '2.0'
title: Mouse Iron Distribution Rich And Deficient Iron Diets Lab
description: Mouse Iron Distribution Dynamics Dynamic model of iron distribution in
  mice. This model attempts to fit the radioiron tracer data from Lopes et al.
models:
- alias: systemsbiology_sbml_mouse_iron_distribution_rich_and_deficient_iron_biomd0000000734_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: systemsbiology_sbml_mouse_iron_distribution_rich_and_deficient_iron_biomd0000000734_model.state
  to:
  - visualisation.systemsbiology_sbml_mouse_iron_distribution_rich_and_deficient_iron_biomd0000000734_model_state
- from: systemsbiology_sbml_mouse_iron_distribution_rich_and_deficient_iron_biomd0000000734_model.summary
  to:
  - visualisation.systemsbiology_sbml_mouse_iron_distribution_rich_and_deficient_iron_biomd0000000734_model_summary
- from: systemsbiology_sbml_mouse_iron_distribution_rich_and_deficient_iron_biomd0000000734_model.species_labels
  to:
  - visualisation.systemsbiology_sbml_mouse_iron_distribution_rich_and_deficient_iron_biomd0000000734_model_species_labels
runtime:
  duration: 1.0
  communication_step: 0.1
  initial_inputs: {}
tags:
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
