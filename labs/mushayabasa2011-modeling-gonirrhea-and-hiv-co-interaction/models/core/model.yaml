description: A mathematical model was designed to explore the co-interaction of gonorrhea
  and HIV in the presence of antiretroviral therapy and gonorrhea treatment. It can
  be used to explore systemsbiology mushayabasa2011 modeling gonirrhea and hiv dynamics
  and compare simulation behavior across conditions.
