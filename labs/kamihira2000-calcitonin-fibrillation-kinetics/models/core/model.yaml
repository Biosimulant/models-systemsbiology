- faithful
- curated
authors:
- Biosimulant Team
- M Kamihira
- A Naito
- S Tuzi
- A Y Nosaka
- H Saitô
upstream:
  id: biomodels_ebi:BIOMD0000000614
  source_db: biomodels_ebi
  source_id: BIOMD0000000614
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000614
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000614?filename=BIOMD0000000614_url.xml
  license: CC0
biosim:
  entrypoint: src.kamihira2000_calcitonin_fibrillation_kinetics_biomd0000000614_model:Kamihira2000CalcitoninFibrillationKineticsBiomd0000000614Model
  init_kwargs:
    model_path: data/BIOMD0000000614.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
