schema_version: '2.0'
title: Larsen2004 Calciumspiking Lab
description: 'This model is from the article: On the encoding and decoding of calcium
  signals in hepatocytes Ann Zahle Larsen, Lars Folke Olsen and Ursula Kummera Biophysical
  Chemistry Volume 107, Issue 1, 1 Januar. It can be used to explore systemsbiology
  larsen2004 calciumspiking BioModels0000000330 dynamics and compare simulation behavior
  across conditions.'
models:
- alias: systemsbiology_sbml_larsen2004_calciumspiking_biomd0000000330_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: systemsbiology_sbml_larsen2004_calciumspiking_biomd0000000330_model.state
  to:
  - visualisation.systemsbiology_sbml_larsen2004_calciumspiking_biomd0000000330_model_state
- from: systemsbiology_sbml_larsen2004_calciumspiking_biomd0000000330_model.summary
