- from: systemsbiology_sbml_larsen2004_calciumspiking_biomd0000000330_model.species_labels
  to:
  - visualisation.systemsbiology_sbml_larsen2004_calciumspiking_biomd0000000330_model_species_labels
runtime:
  duration: 1.0
  communication_step: 0.1
  initial_inputs: {}
tags:
- physiology
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
