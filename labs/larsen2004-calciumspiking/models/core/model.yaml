schema_version: '2.0'
title: Larsen2004_CalciumSpiking
description: 'This model is from the article: On the encoding and decoding of calcium
  signals in hepatocytes Ann Zahle Larsen, Lars Folke Olsen and Ursula Kummera Biophysical
  Chemistry Volume 107, Issue 1, 1 Januar. It can be used to explore systemsbiology
  larsen2004 calciumspiking BioModels0000000330 dynamics and compare simulation behavior
  across conditions.'
standard: other
tags:
- physiology
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Ann Zahle Larsen
- L F Olsen
- Ursula Kummer
upstream:
  id: biomodels_ebi:BIOMD0000000330
  source_db: biomodels_ebi
  source_id: BIOMD0000000330
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000330
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000330?filename=BIOMD0000000330_url.xml
  license: CC0
biosim:
  entrypoint: src.larsen2004_calciumspiking_biomd0000000330_model:Larsen2004CalciumspikingBiomd0000000330Model
  init_kwargs:
    model_path: data/BIOMD0000000330.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
io:
  inputs:
  - name: initial_calcium_er
    maps_to: Ca_ER
    label: Initial Calcium Er
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Ca_ER`.
  - name: initial_g_alpha
    maps_to: G_alpha
    label: Initial G Alpha
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `G_alpha`.
  - name: initial_calcium_cyt
    maps_to: Ca_cyt
    label: Initial Calcium Cyt
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Ca_cyt`.
  - name: initial_calcium_mit
    maps_to: Ca_mit
    label: Initial Calcium Mit
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Ca_mit`.
  - name: initial_model_state_plc
    maps_to: PLC
    label: Initial Model State Plc
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `PLC`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: calcium_er
    maps_to: Ca_ER
    label: Calcium-ER
    description: Calcium-ER. Maps to SBML symbol `Ca_ER`.
  - name: g_alpha
    maps_to: G_alpha
    label: G-alpha
    description: G-alpha. Maps to SBML symbol `G_alpha`.
  - name: calcium_cyt
    maps_to: Ca_cyt
    label: Calcium-Cyt
    description: Calcium-Cyt. Maps to SBML symbol `Ca_cyt`.
  - name: calcium_mit
    maps_to: Ca_mit
    label: Calcium-mit
    description: Calcium-mit. Maps to SBML symbol `Ca_mit`.
  - name: plc
    maps_to: PLC
    label: PLC
    description: PLC. Maps to SBML symbol `PLC`.
