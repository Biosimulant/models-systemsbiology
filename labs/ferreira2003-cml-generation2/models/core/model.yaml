schema_version: '2.0'
title: Ferreira2003_CML_generation2
description: The model should reproduce the figure 2F of the article. The equation
  7 has been split into equations 7a-7c, in order to take into account the different
  flux rates of Lysine and CML formation from Sch.
standard: other
tags:
- generegulation
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- António E N Ferreira
- Ana M J Ponces Freire
- Eberhard O Voit
upstream:
  id: biomodels_ebi:BIOMD0000000053
  source_db: biomodels_ebi
  source_id: BIOMD0000000053
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000053
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000053?filename=BIOMD0000000053_url.xml
  license: CC0
biosim:
  entrypoint: src.ferreira2003_cml_generation2_biomd0000000053_model:Ferreira2003CmlGeneration2Biomd0000000053Model
  init_kwargs:
    model_path: data/BIOMD0000000053.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
io:
  inputs:
  - name: initial_glucose
    maps_to: Glucose
    label: Initial Glucose
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Glucose`.
  - name: initial_lysine
    maps_to: Lysine
    label: Initial Lysine
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Lysine`.
  - name: initial_schiff
    maps_to: Schiff
    label: Initial Schiff
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Schiff`.
  - name: initial_glyoxal
    maps_to: Glyoxal
    label: Initial Glyoxal
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Glyoxal`.
  - name: initial_model_state_cml
    maps_to: CML
    label: Initial Model State Cml
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `CML`.
  - name: initial_amadori
    maps_to: Amadori
    label: Initial Amadori
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Amadori`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: glucose
    maps_to: Glucose
    label: Glucose
    description: Glucose. Maps to SBML symbol `Glucose`.
  - name: lysine
    maps_to: Lysine
    label: Lysine
    description: Lysine. Maps to SBML symbol `Lysine`.
  - name: schiff
    maps_to: Schiff
    label: Schiff
    description: Schiff. Maps to SBML symbol `Schiff`.
  - name: glyoxal
    maps_to: Glyoxal
    label: Glyoxal
    description: Glyoxal. Maps to SBML symbol `Glyoxal`.
  - name: cml
    maps_to: CML
    label: CML
    description: CML. Maps to SBML symbol `CML`.
  - name: amadori
    maps_to: Amadori
    label: Amadori
    description: Amadori. Maps to SBML symbol `Amadori`.
