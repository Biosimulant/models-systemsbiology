description: Venkatraman2012 - Interplay between PLS and TSP1 in TGF-β1 activation
  The interplay between PLS (Plasmin) and TSP1 (Thrombospondin-1) in TGF-β1 (Transforming
  growth factor-β1)is shown using mathematic. It can be used to explore systemsbiology
  venkatraman2012 interplay between pls and dynamics and compare simulation behavior
  across conditions.
