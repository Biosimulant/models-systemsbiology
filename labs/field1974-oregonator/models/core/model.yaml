schema_version: '2.0'
title: Field1974_Oregonator
description: Field-Noyes Model of BZ Reaction Citation R.J.Field and R.M.Noyes,J.Chem.Phys.60,1877
  (1974) Description Field Noyes Version of Belousov-Zhabotinsky Reaction. It can
  be used to explore systemsbiology field1974 oregonator BioModels0000000040 dynamics
  and compare simulation behavior across conditions.
standard: other
tags:
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Richard J. Field
- Richard M. Noyes
upstream:
  id: biomodels_ebi:BIOMD0000000040
  source_db: biomodels_ebi
  source_id: BIOMD0000000040
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000040
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000040?filename=BIOMD0000000040_url.xml
  license: CC0
biosim:
  entrypoint: src.field1974_oregonator_biomd0000000040_model:Field1974OregonatorBiomd0000000040Model
  init_kwargs:
    model_path: data/BIOMD0000000040.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
io:
  inputs:
  - name: initial_br_o3
    maps_to: BrO3
    label: Initial Br O3
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `BrO3`.
  - name: initial_model_state_ce4
    maps_to: Ce
    label: Initial Model State CE4
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Ce`.
  - name: initial_model_state_br
    maps_to: Br
    label: Initial Model State Br
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Br`.
  - name: initial_h_br_o2
    maps_to: HBrO2
    label: Initial H Br O2
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `HBrO2`.
  - name: initial_ho_br
    maps_to: HOBr
    label: Initial Ho Br
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `HOBr`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: br_o3
    maps_to: BrO3
    label: BrO3-
    description: BrO3-. Maps to SBML symbol `BrO3`.
  - name: ce4
    maps_to: Ce
    label: Ce4+
    description: Ce4+. Maps to SBML symbol `Ce`.
  - name: model_state_br
    maps_to: Br
    label: Br-
    description: Br-. Maps to SBML symbol `Br`.
  - name: h_br_o2
    maps_to: HBrO2
    label: HBrO2
    description: HBrO2. Maps to SBML symbol `HBrO2`.
  - name: ho_br
    maps_to: HOBr
    label: HOBr
    description: HOBr. Maps to SBML symbol `HOBr`.
