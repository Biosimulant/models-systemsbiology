schema_version: '2.0'
title: Abu-Soud1999_L-Arginine
description: This model was taken from the &lt;a href = 'http://www.ncbi.nlm.nih.gov/entrez/query.fcgi?db=pubmed&amp;cmd=Retrieve&amp;dopt=AbstractPlus&amp;list_uids=10493814&amp;query_hl=10&amp;itool=pubmed_docsu.
  It can be used to explore systemsbiology abu soud1999 l arginine model9087766308
  dynamics and compare simulation behavior across conditions.
standard: other
tags:
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- H M Abu-Soud
- J Wang
- D L Rousseau
- D J Stuehr
upstream:
  id: biomodels_ebi:MODEL9087766308
  source_db: biomodels_ebi
  source_id: MODEL9087766308
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/MODEL9087766308
  download_url: https://www.ebi.ac.uk/biomodels/model/download/MODEL9087766308?filename=MODEL9087766308_url.xml
  license: CC0
biosim:
  entrypoint: src.abu_soud1999_l_arginine_model9087766308_model:AbuSoud1999LArginineModel9087766308Model
  init_kwargs:
    model_path: data/MODEL9087766308.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
io:
  inputs:
  - name: initial_l_minus_arginine
    maps_to: L_minus_Arginine
    label: Initial L Minus Arginine
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `L_minus_Arginine`.
  - name: initial_im_minus_nnos
    maps_to: Im_minus_nNOS
    label: Initial Im Minus Nnos
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Im_minus_nNOS`.
  - name: initial_imidazole
    maps_to: Imidazole
    label: Initial Imidazole
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Imidazole`.
  - name: initial_nnos_minus_l_minus_arginine
    maps_to: nNOS_minus_L_minus_Arginine
    label: Initial Nnos Minus L Minus Arginine
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `nNOS_minus_L_minus_Arginine`.
  - name: initial_im_minus_nnos_minus_l_minus_arginine
    maps_to: Im_minus_nNOS_minus_L_minus_Arginine
    label: Initial Im Minus Nnos Minus L Minus Arginine
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Im_minus_nNOS_minus_L_minus_Arginine`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: l_minus_arginine
    maps_to: L_minus_Arginine
    label: L Minus Arginine
    description: L Minus Arginine. Maps to SBML symbol `L_minus_Arginine`.
  - name: im_minus_nnos
    maps_to: Im_minus_nNOS
    label: Im Minus NNOS
    description: Im Minus NNOS. Maps to SBML symbol `Im_minus_nNOS`.
  - name: imidazole
    maps_to: Imidazole
    label: Imidazole
    description: Imidazole. Maps to SBML symbol `Imidazole`.
  - name: nnos_minus_l_minus_arginine
    maps_to: nNOS_minus_L_minus_Arginine
    label: NNOS Minus L Minus Arginine
    description: NNOS Minus L Minus Arginine. Maps to SBML symbol `nNOS_minus_L_minus_Arginine`.
  - name: im_minus_nnos_minus_l_minus_arginine
    maps_to: Im_minus_nNOS_minus_L_minus_Arginine
    label: Im Minus NNOS Minus L Minus Arginine
    description: Im Minus NNOS Minus L Minus Arginine. Maps to SBML symbol `Im_minus_nNOS_minus_L_minus_Arginine`.
