io:
  inputs:
  - name: initial_mrna_p_vegfr
    maps_to: mRNA_P_VEGFR
    label: Initial MRNA P Vegfr
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `mRNA_P_VEGFR`.
  - name: initial_mrna_m_vegfr
    maps_to: mRNA_M_VEGFR
    label: Initial MRNA M Vegfr
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `mRNA_M_VEGFR`.
  - name: initial_mrna_e_vegfr
    maps_to: mRNA_E_VEGFR
    label: Initial MRNA E Vegfr
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `mRNA_E_VEGFR`.
  - name: initial_protein_p_vegf_signal
    maps_to: PROTEIN_P_VEGFSignal
    label: Initial Protein P Vegf Signal
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `PROTEIN_P_VEGFSignal`.
  - name: initial_protein_p_vegfr
    maps_to: PROTEIN_P_VEGFR
    label: Initial Protein P Vegfr
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `PROTEIN_P_VEGFR`.
  - name: initial_protein_m_vegf_signal
    maps_to: PROTEIN_M_VEGFSignal
    label: Initial Protein M Vegf Signal
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `PROTEIN_M_VEGFSignal`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: mrna_p_vegfr
    maps_to: mRNA_P_VEGFR
    label: mRNA_P_VEGFR
    description: mRNA_P_VEGFR. Maps to SBML symbol `mRNA_P_VEGFR`.
  - name: mrna_m_vegfr
    maps_to: mRNA_M_VEGFR
    label: mRNA_M_VEGFR
    description: mRNA_M_VEGFR. Maps to SBML symbol `mRNA_M_VEGFR`.
  - name: mrna_e_vegfr
    maps_to: mRNA_E_VEGFR
    label: mRNA_E_VEGFR
    description: mRNA_E_VEGFR. Maps to SBML symbol `mRNA_E_VEGFR`.
  - name: protein_p_vegf_signal
    maps_to: PROTEIN_P_VEGFSignal
    label: PROTEIN_P_VEGFSignal
    description: PROTEIN_P_VEGFSignal. Maps to SBML symbol `PROTEIN_P_VEGFSignal`.
  - name: protein_p_vegfr
    maps_to: PROTEIN_P_VEGFR
    label: PROTEIN_P_VEGFR
    description: PROTEIN_P_VEGFR. Maps to SBML symbol `PROTEIN_P_VEGFR`.
  - name: protein_m_vegf_signal
    maps_to: PROTEIN_M_VEGFSignal
    label: PROTEIN_M_VEGFSignal
    description: PROTEIN_M_VEGFSignal. Maps to SBML symbol `PROTEIN_M_VEGFSignal`.
