schema_version: '2.0'
title: Orfeo2010 - Simulating the effects of fondaparinux and Rivaroxaban on thrombin
  generation
description: Reused mathematical model (Hockin et al., 2002) of blood coagulation
  simulating the effects of coagulation factor inhibitors, fondaparinux (synthetic
  heparin) and Rivaroxaban. It can be used to explore systemsbiology orfeo2010 simulating
  the effects of dynamics and compare simulation behavior across conditions.
