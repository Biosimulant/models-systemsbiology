  - name: initial_model_state_r_b
    maps_to: rB
    label: Initial Model State R B
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `rB`.
  - name: initial_ag_b
    maps_to: AgB
    label: Initial Ag B
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `AgB`.
  - name: initial_model_state_ab
    maps_to: AB
    label: Initial Model State Ab
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `AB`.
  - name: initial_model_state_a
    maps_to: A
    label: Initial Model State A
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `A`.
  - name: initial_model_state_b
    maps_to: B
    label: Initial Model State B
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `B`.
