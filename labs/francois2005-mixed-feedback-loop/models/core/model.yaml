    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: g_b
    maps_to: gB
    label: gB
    description: gB. Maps to SBML symbol `gB`.
  - name: r_b
    maps_to: rB
    label: rB
    description: rB. Maps to SBML symbol `rB`.
  - name: ag_b
    maps_to: AgB
    label: AgB
    description: AgB. Maps to SBML symbol `AgB`.
  - name: model_state_ab
    maps_to: AB
    label: AB
    description: AB. Maps to SBML symbol `AB`.
  - name: model_state_a
    maps_to: A
    label: A
    description: A. Maps to SBML symbol `A`.
  - name: model_state_b
    maps_to: B
