title: Liu2010 Hormonal Crosstalk Arabidopsis Lab
description: 'This is the single cell model for analysis of hormonal crosstalk in
  Arabidopsis described in the article: Modelling and experimental analysis of hormonal
  crosstalk in Arabidopsis. It can be used to explore systemsbiology liu2010 hormonal
  crosstalk arabidopsis BioModels0000000269 dynamics and compare simulation behavior
  across conditions.'
