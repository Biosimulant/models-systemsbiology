io:
  inputs:
  - name: initial_ra_total
    maps_to: RaT
    label: Initial Ra Total
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `RaT`.
  - name: initial_model_state_ra
    maps_to: Ra_star
    label: Initial Model State Ra
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Ra_star`.
  - name: initial_re_total
    maps_to: ReT
    label: Initial Re Total
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `ReT`.
  - name: initial_model_state_re
    maps_to: Re_star
    label: Initial Model State Re
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Re_star`.
  - name: initial_ctr1_total
    maps_to: CTR1T
    label: Initial Ctr1 Total
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `CTR1T`.
  - name: initial_ctr1
    maps_to: CTR1_star
    label: Initial Ctr1
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `CTR1_star`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: ra_total
    maps_to: RaT
    label: Ra_total
    description: Ra_total. Maps to SBML symbol `RaT`.
  - name: model_state_ra
    maps_to: Ra_star
    label: Ra*
    description: Ra*. Maps to SBML symbol `Ra_star`.
  - name: re_total
    maps_to: ReT
    label: Re_total
    description: Re_total. Maps to SBML symbol `ReT`.
  - name: model_state_re
    maps_to: Re_star
    label: Re*
    description: Re*. Maps to SBML symbol `Re_star`.
  - name: ctr1_total
    maps_to: CTR1T
    label: CTR1_total
    description: CTR1_total. Maps to SBML symbol `CTR1T`.
  - name: ctr1
    maps_to: CTR1_star
    label: CTR1*
    description: CTR1*. Maps to SBML symbol `CTR1_star`.
