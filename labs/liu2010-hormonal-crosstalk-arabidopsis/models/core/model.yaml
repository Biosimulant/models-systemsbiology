  source_db: biomodels_ebi
  source_id: BIOMD0000000269
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000269
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000269?filename=BIOMD0000000269_url.xml
  license: CC0
biosim:
