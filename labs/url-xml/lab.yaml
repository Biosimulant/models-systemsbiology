schema_version: '2.0'
title: Url Xml Lab
description: This is a kinetic model of the monomeric photosystem II (PSII). The model
  is partially based on the earlier model used for simulation of the flash-induced
  period-four damped oscillation of oxygen evol.
models:
- alias: systemsbiology_sbml_model3631586579_url_xml_model3631586579_model
  path: models/core
- alias: visualisation
