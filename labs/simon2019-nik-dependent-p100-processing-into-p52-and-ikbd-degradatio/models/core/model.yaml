schema_version: '2.0'
title: Simon2019 - NIK-dependent p100 processing into p52 and IkBd degradation, Michaelis-Menten,
  SBML 2v4
description: This model represents NIK-dependent p100 processing into p52 and NIK-dependent
  IkBd degradation with Michaelis-Menten kinetics. It can be used to explore systemsbiology
  simon2019 nik dependent p100 processing dynamics and compare simulation behavior
  across conditions.
standard: other
tags:
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Simon Mitchell
- Alexander Hoffmann
upstream:
  id: biomodels_ebi:BIOMD0000000869
  source_db: biomodels_ebi
  source_id: BIOMD0000000869
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000869
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000869?filename=Simon2019_model3.xml
  license: CC0
biosim:
  entrypoint: src.simon2019_nik_dependent_p100_processing_into_p52_biomd0000000869_model:Simon2019NikDependentP100ProcessingIntoP52Biomd0000000869Model
  init_kwargs:
    model_path: data/BIOMD0000000869.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
io:
  inputs:
  - name: initial_p100t
    maps_to: p100t
    label: Initial P100t
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `p100t`.
  - name: initial_model_state_p52
    maps_to: p52
    label: Initial Model State P52
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `p52`.
  - name: initial_p100
    maps_to: p100
    label: Initial P100
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `p100`.
  - name: initial_model_state_nik
    maps_to: NIK
    label: Initial Model State Nik
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `NIK`.
  - name: initial_ik_bd
    maps_to: IkBd
    label: Initial Ik Bd
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `IkBd`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: p100t
    maps_to: p100t
    label: p100t
    description: p100t. Maps to SBML symbol `p100t`.
  - name: p52
    maps_to: p52
    label: p52
    description: p52. Maps to SBML symbol `p52`.
  - name: p100
    maps_to: p100
    label: p100
    description: p100. Maps to SBML symbol `p100`.
  - name: nik
    maps_to: NIK
    label: NIK
    description: NIK. Maps to SBML symbol `NIK`.
  - name: ik_bd
    maps_to: IkBd
    label: IkBd
    description: IkBd. Maps to SBML symbol `IkBd`.
