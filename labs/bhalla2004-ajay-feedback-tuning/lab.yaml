schema_version: '2.0'
title: Bhalla2004 Ajay Feedback Tuning Lab
description: This model is taken from &lt;a href = 'http://www.ncbi.nlm.nih.gov/entrez/query.fcgi?db=pubmed&amp;cmd=Retrieve&amp;dopt=AbstractPlus&amp;list_uids=15548210&amp;query_hl=1&amp;itool=pubmed_docsum'&gt;.
  It can be used to explore systemsbiology ajay bhalla 2004 feedback tuning dynamics
  and compare simulation behavior across conditions.
models:
- alias: systemsbiology_sbml_ajay_bhalla_2004_feedback_tuning_model9089914876_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: systemsbiology_sbml_ajay_bhalla_2004_feedback_tuning_model9089914876_model.state
  to:
  - visualisation.systemsbiology_sbml_ajay_bhalla_2004_feedback_tuning_model9089914876_model_state
- from: systemsbiology_sbml_ajay_bhalla_2004_feedback_tuning_model9089914876_model.summary
  to:
  - visualisation.systemsbiology_sbml_ajay_bhalla_2004_feedback_tuning_model9089914876_model_summary
- from: systemsbiology_sbml_ajay_bhalla_2004_feedback_tuning_model9089914876_model.species_labels
  to:
  - visualisation.systemsbiology_sbml_ajay_bhalla_2004_feedback_tuning_model9089914876_model_species_labels
runtime:
  duration: 1.0
  communication_step: 0.1
  initial_inputs: {}
tags:
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
io:
