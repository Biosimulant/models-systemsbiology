schema_version: '2.0'
title: Valero2016 - Ascorbate-Glutathione cycle in chloroplasts under light/dark conditions
description: 'Valero2016 - Ascorbate-Glutathione cycle in chloroplasts under light/dark
  conditions This model is described in the article: Modeling the ascorbate-glutathione
  cycle in chloroplasts under light/dark c. It can be used to explore systemsbiology
  valero2016 ascorbate glutathione cycle in dynamics and compare simulation behavior
  across conditions.'
standard: other
tags:
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Edelmira Valero
- Hermenegilda Macià
- Ildefonso M De la Fuente
- José-Antonio Hernández
- María-Isabel González-Sánchez
