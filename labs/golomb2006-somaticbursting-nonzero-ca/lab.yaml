  - visualisation.systemsbiology_sbml_golomb2006_somaticbursting_nonzero_ca_biomd0000000119_model_species_labels
runtime:
  duration: 1.0
  communication_step: 0.1
  initial_inputs: {}
tags:
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
io:
