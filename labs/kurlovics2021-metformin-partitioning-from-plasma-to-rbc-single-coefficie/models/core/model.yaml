schema_version: '2.0'
title: Kurlovics2021 - Metformin partitioning from plasma to RBC, single coefficient
description: This model is a supplementary material of a manuscript'Diffusion driven
  metformin exchange transport rates between plasma and red blood cells'by Janis Kurlovics,
  Darta Maija Zake, Linda Zaharenko, Kri. It can be used to explore systemsbiology
  kurlovics2021 metformin partitioning from plasma dynamics and compare simulation
  behavior across conditions.
standard: other
tags:
- systemsbiology
- sbml
- biomodels_ebi
- faithful
- curated
authors:
- Biosimulant Team
- Kurlovics J
- Zake DM
- Zaharenko L
- Berzins K
- Klovins J
upstream:
  id: biomodels_ebi:BIOMD0000001040
  source_db: biomodels_ebi
  source_id: BIOMD0000001040
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000001040
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000001040?filename=Kurlovics2021_single.xml
  license: CC0
biosim:
  entrypoint: src.kurlovics2021_metformin_partitioning_from_plasma_biomd0000001040_model:Kurlovics2021MetforminPartitioningFromPlasmaBiomd0000001040Model
  init_kwargs:
    model_path: data/BIOMD0000001040.xml
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
io:
  inputs:
  - name: initial_mrbc
    maps_to: Mrbc
    label: Initial Mrbc
    description: Source state initial condition exposed as a model-specific control
      because no explicit intervention parameter is identifiable. Maps to SBML symbol
      `Mrbc`.
  outputs:
  - name: state
    description: Full SBML observable state record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Largest-change and peak summary across simulated SBML observables.
  - name: species_labels
    description: Mapping from SBML observable symbols to display labels.
  - name: mrbc
    maps_to: Mrbc
    label: Mrbc
    description: Mrbc. Maps to SBML symbol `Mrbc`.
