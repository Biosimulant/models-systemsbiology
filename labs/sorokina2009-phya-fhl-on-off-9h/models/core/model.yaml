schema_version: '2.0'
title: Sorokina2009_PhyA_FHL_ON_OFF_9h
description: 'Final version obtained by merging of the PhyA_FHL model with On_OFF
  9h long experiment This model originates from BioModels Database: A Database of
  Annotated Published Models (http://www.ebi.ac.uk/bio. It can be used to explore
  systemsbiology sorokina2009 phya fhl on off dynamics and compare simulation behavior
  across conditions.'
