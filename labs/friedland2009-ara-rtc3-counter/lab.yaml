schema_version: '2.0'
title: Friedland2009 Ara Rtc3 Counter Lab
description: 'This is the model of the RTC3 counter described in the article: Synthetic
  gene networks that count. Friedland AE, Lu TK, Wang X, Shi D, Church G, Collins
  JJ.'
models:
- alias: systemsbiology_sbml_friedland2009_ara_rtc3_counter_biomd0000000301_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
